stages:
  - compile
  - package
  - validate

variables:
  ACT_IMAGE: ${CI_REGISTRY}/ben/act:latest
  RPI5_IMAGE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver
  RPI5_IMAGE_CACHE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver/cache
  SEAWEEDFS_COSI_IMAGE: ${CI_REGISTRY_IMAGE}/seaweedfs-cosi-driver
  SEAWEEDFS_COSI_IMAGE_CACHE: ${CI_REGISTRY_IMAGE}/seaweedfs-cosi-driver/cache

.buildah_before: &buildah_before
  - mkdir -p ${CI_PROJECT_DIR}/.local/share/containers
  - export XDG_RUNTIME_DIR=${CI_PROJECT_DIR}/.local
  - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

.rules_rpi5: &rules_rpi5
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - drivers/rpi5-dra-driver/**/*
      - .gitlab-ci.yml

.rules_seaweedfs_cosi: &rules_seaweedfs_cosi
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - drivers/seaweedfs-cosi-driver/**/*
      - .gitlab-ci.yml

compile:rpi5-dra-driver:
  stage: compile
  needs: []
  image:
    name: ${ACT_IMAGE}
    pull_policy: always
  script:
    - cd drivers/rpi5-dra-driver
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o dist/rpi5-dra-driver-amd64 ./cmd/rpi5-dra-driver
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '-s -w' -o dist/rpi5-dra-driver-arm64 ./cmd/rpi5-dra-driver
  artifacts:
    paths:
      - drivers/rpi5-dra-driver/dist/
    expire_in: 1 hour
  rules:
    - *rules_rpi5

package:rpi5-dra-driver:
  stage: package
  needs:
    - job: compile:rpi5-dra-driver
      artifacts: true
  image: quay.io/buildah/stable:latest
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "1"
  before_script: *buildah_before
  script:
    - for ARCH in amd64 arm64; do
        buildah build
          --arch ${ARCH}
          --build-arg TARGETARCH=${ARCH}
          --layers
          --cache-from ${RPI5_IMAGE_CACHE}-${ARCH}
          --cache-to ${RPI5_IMAGE_CACHE}-${ARCH}
          -t ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH}
          drivers/rpi5-dra-driver/
        &&
        buildah push ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH};
      done
    - buildah manifest create ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest add ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64
    - buildah manifest add ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64
    - buildah manifest push --all --format v2s2 ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest push --all --format v2s2 ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:latest
  rules:
    - *rules_rpi5

compile:seaweedfs-cosi-driver:
  stage: compile
  needs: []
  image:
    name: ${ACT_IMAGE}
    pull_policy: always
  script:
    - cd drivers/seaweedfs-cosi-driver
    - go test ./...
    - mkdir -p dist
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o dist/seaweedfs-cosi-driver-amd64 ./cmd/seaweedfs-cosi-driver
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '-s -w' -o dist/seaweedfs-cosi-driver-arm64 ./cmd/seaweedfs-cosi-driver
  artifacts:
    paths:
      - drivers/seaweedfs-cosi-driver/dist/
    expire_in: 1 hour
  rules:
    - *rules_seaweedfs_cosi

package:seaweedfs-cosi-driver:
  stage: package
  needs:
    - job: compile:seaweedfs-cosi-driver
      artifacts: true
  image: quay.io/buildah/stable:latest
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "1"
  before_script: *buildah_before
  script:
    - for ARCH in amd64 arm64; do
        buildah build
          --arch ${ARCH}
          --build-arg TARGETARCH=${ARCH}
          --layers
          --cache-from ${SEAWEEDFS_COSI_IMAGE_CACHE}-${ARCH}
          --cache-to ${SEAWEEDFS_COSI_IMAGE_CACHE}-${ARCH}
          -t ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH}
          drivers/seaweedfs-cosi-driver/
        &&
        buildah push ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH};
      done
    - buildah manifest create ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest add ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64
    - buildah manifest add ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64
    - buildah manifest push --all --format v2s2 ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest push --all --format v2s2 ${SEAWEEDFS_COSI_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${SEAWEEDFS_COSI_IMAGE}:latest
  rules:
    - *rules_seaweedfs_cosi

.validate_manifest_rules: &validate_manifest_rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
      - apps/**/*
      - clusters/**/*
      - infrastructure/**/*
      - scripts/validate_kustomize.sh
      - .gitlab-ci.yml
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - apps/**/*
      - clusters/**/*
      - infrastructure/**/*
      - scripts/validate_kustomize.sh
      - .gitlab-ci.yml

.validate_driver_rules: &validate_driver_rules
  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    changes:
      - drivers/**/*
      - .gitlab-ci.yml
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - drivers/**/*
      - .gitlab-ci.yml

validate:manifests:
  image: ${ACT_IMAGE}
  stage: validate
  needs: []
  script:
    - ./scripts/validate_kustomize.sh
  rules: *validate_manifest_rules

validate:driver-sources:
  image: ${ACT_IMAGE}
  stage: validate
  needs: []
  script:
    - |
      unformatted="$(find drivers -name '*.go' -type f -exec gofmt -l {} +)"
      if [ -n "${unformatted}" ]; then
        echo "Unformatted Go files:"
        echo "${unformatted}"
        exit 1
      fi
  rules: *validate_driver_rules
