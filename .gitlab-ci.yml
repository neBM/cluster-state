stages:
  - build
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  ACT_IMAGE: ${CI_REGISTRY}/ben/act:latest

.buildah_before: &buildah_before
  - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build-rpi5-dra-driver:
  stage: build
  needs: []
  image: quay.io/buildah/stable:latest
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "1"
    IMAGE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver
    IMAGE_CACHE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver/cache
  before_script: *buildah_before
  script:
    - for ARCH in amd64 arm64; do
        buildah build
          --arch ${ARCH}
          --build-arg TARGETARCH=${ARCH}
          --layers
          --cache-from ${IMAGE_CACHE}-${ARCH}
          --cache-to ${IMAGE_CACHE}-${ARCH}
          -t ${IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH}
          drivers/rpi5-dra-driver/
        &&
        buildah push ${IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH};
      done
    - buildah manifest create ${IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest add ${IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64
    - buildah manifest add ${IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64
    - buildah manifest push --all --format v2s2 ${IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest push --all --format v2s2 ${IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${IMAGE}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - drivers/rpi5-dra-driver/**/*
        - .gitlab-ci.yml

.terraform-base:
  image: ${ACT_IMAGE}
  cache:
    key: terraform-plugins
    paths:
      - .terraform/providers
  before_script:
    # Setup kubeconfig using ServiceAccount token (limited RBAC)
    # Required CI variables: K8S_HOST, K8S_TOKEN, K8S_CA_CERT
    # Write to ~/.kube/k3s-config to match provider config_path
    - mkdir -p ~/.kube
    - |
      cat > ~/.kube/k3s-config << EOF
      apiVersion: v1
      kind: Config
      clusters:
      - name: k3s
        cluster:
          server: ${K8S_HOST}
          certificate-authority-data: ${K8S_CA_CERT}
      contexts:
      - name: default
        context:
          cluster: k3s
          user: terraform-ci
      current-context: default
      users:
      - name: terraform-ci
        user:
          token: ${K8S_TOKEN}
      EOF
    - chmod 600 ~/.kube/k3s-config

validate:
  extends: .terraform-base
  stage: validate
  needs: []
  script:
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

plan:
  extends: .terraform-base
  stage: plan
  needs:
    - job: validate
  script:
    - terraform init -backend-config="conn_str=$PG_CONN_STR"
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
      - .terraform
      - .terraform.lock.hcl
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

apply:
  extends: .terraform-base
  stage: apply
  needs:
    - job: plan
      artifacts: true
  script:
    - terraform init -backend-config="conn_str=$PG_CONN_STR"
    - terraform apply -auto-approve
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
