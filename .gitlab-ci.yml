stages:
  - compile
  - package
  - validate
  - plan
  - apply

variables:
  TF_IN_AUTOMATION: "true"
  ACT_IMAGE: ${CI_REGISTRY}/ben/act:latest
  RPI5_IMAGE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver
  RPI5_IMAGE_CACHE: ${CI_REGISTRY_IMAGE}/rpi5-dra-driver/cache

.buildah_before: &buildah_before
  - mkdir -p ${CI_PROJECT_DIR}/.local/share/containers
  - export XDG_RUNTIME_DIR=${CI_PROJECT_DIR}/.local
  - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

.rules_rpi5: &rules_rpi5
  - if: $CI_COMMIT_BRANCH == "main"
    changes:
      - drivers/rpi5-dra-driver/**/*
      - .gitlab-ci.yml

compile:rpi5-dra-driver:
  stage: compile
  needs: []
  image:
    name: ${ACT_IMAGE}
    pull_policy: always
  script:
    - cd drivers/rpi5-dra-driver
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags '-s -w' -o dist/rpi5-dra-driver-amd64 ./cmd/rpi5-dra-driver
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags '-s -w' -o dist/rpi5-dra-driver-arm64 ./cmd/rpi5-dra-driver
  artifacts:
    paths:
      - drivers/rpi5-dra-driver/dist/
    expire_in: 1 hour
  rules:
    - *rules_rpi5

package:rpi5-dra-driver:
  stage: package
  needs:
    - job: compile:rpi5-dra-driver
      artifacts: true
  image: quay.io/buildah/stable:latest
  variables:
    GIT_STRATEGY: fetch
    GIT_DEPTH: "1"
  before_script: *buildah_before
  script:
    - for ARCH in amd64 arm64; do
        buildah build
          --arch ${ARCH}
          --build-arg TARGETARCH=${ARCH}
          --layers
          --cache-from ${RPI5_IMAGE_CACHE}-${ARCH}
          --cache-to ${RPI5_IMAGE_CACHE}-${ARCH}
          -t ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH}
          drivers/rpi5-dra-driver/
        &&
        buildah push ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-${ARCH};
      done
    - buildah manifest create ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest add ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-amd64
    - buildah manifest add ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}-arm64
    - buildah manifest push --all --format v2s2 ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - buildah manifest push --all --format v2s2 ${RPI5_IMAGE}:${CI_COMMIT_SHORT_SHA} docker://${RPI5_IMAGE}:latest
  rules:
    - *rules_rpi5

.terraform-base:
  image: ${ACT_IMAGE}
  cache:
    key: terraform-plugins
    paths:
      - .terraform/providers
  before_script:
    # Setup kubeconfig using ServiceAccount token (limited RBAC)
    # Required CI variables: K8S_HOST, K8S_TOKEN, K8S_CA_CERT
    # Write to ~/.kube/k3s-config to match provider config_path
    - mkdir -p ~/.kube
    - |
      cat > ~/.kube/k3s-config << EOF
      apiVersion: v1
      kind: Config
      clusters:
      - name: k3s
        cluster:
          server: ${K8S_HOST}
          certificate-authority-data: ${K8S_CA_CERT}
      contexts:
      - name: default
        context:
          cluster: k3s
          user: terraform-ci
      current-context: default
      users:
      - name: terraform-ci
        user:
          token: ${K8S_TOKEN}
      EOF
    - chmod 600 ~/.kube/k3s-config

validate:
  extends: .terraform-base
  stage: validate
  needs: []
  script:
    - terraform fmt -check -recursive
    - terraform init -backend=false
    - terraform validate
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

plan:
  extends: .terraform-base
  stage: plan
  needs:
    - job: validate
  script:
    - terraform init -backend-config="conn_str=$PG_CONN_STR"
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
      - .terraform
      - .terraform.lock.hcl
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

apply:
  extends: .terraform-base
  stage: apply
  needs:
    - job: plan
      artifacts: true
  script:
    - terraform init -backend-config="conn_str=$PG_CONN_STR"
    - terraform apply -auto-approve
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
