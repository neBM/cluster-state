apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-backups
  namespace: flux-system
spec:
  dependsOn:
  - name: storage
  interval: 10m0s
  path: ./infrastructure/storage/restic-backup
  prune: false
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: true
