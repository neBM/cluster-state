apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-cosi-driver
  namespace: flux-system
spec:
  dependsOn:
  - name: storage
  - name: storage-cosi
  interval: 10m0s
  path: ./infrastructure/storage/seaweedfs/cosi
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: true
