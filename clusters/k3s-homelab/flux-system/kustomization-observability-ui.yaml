apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: observability-ui
  namespace: flux-system
spec:
  dependsOn:
  - name: observability-core
  - name: platform
  interval: 10m0s
  path: ./infrastructure/observability-ui
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: true
