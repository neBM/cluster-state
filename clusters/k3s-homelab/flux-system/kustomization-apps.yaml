apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
  - name: storage
  - name: platform
  - name: shared-services
  interval: 10m0s
  path: ./apps
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: true
