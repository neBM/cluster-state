apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-classes
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/storage/storage-classes
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: true
