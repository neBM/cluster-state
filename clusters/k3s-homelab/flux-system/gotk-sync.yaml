apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cluster-state
  namespace: flux-system
spec:
  interval: 1h0m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://git.brmartin.co.uk/ben/cluster-state.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-state
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/k3s-homelab
  prune: true
  retryInterval: 1m0s
  sourceRef:
    kind: GitRepository
    name: cluster-state
  timeout: 10m0s
  wait: false
