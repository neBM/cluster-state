repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: kustomize-render
        name: Kustomize Render
        entry: ./scripts/validate_kustomize.sh
        language: system
        files: ^(apps/|clusters/|infrastructure/|scripts/validate_kustomize\.sh)
        pass_filenames: false
      - id: nomad-fmt
        name: Nomad Format
        entry: nomad fmt
        language: system
        files: \.nomad\.hcl$
        pass_filenames: false
        args: ["-check", "-recursive"]
      - id: nomad-validate
        name: Nomad Validate
        entry: bash -c 'for file in "$@"; do nomad job validate "$file" || exit 1; done' --
        language: system
        files: \.nomad\.hcl$
        pass_filenames: true
