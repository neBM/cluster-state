apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rspamd-data-local
  namespace: default
  labels:
    app: rspamd
    environment: prod
    managed-by: flux
  annotations:
    storage-note: "Local retained Rspamd runtime state; Bayes data lives in Redis, keep old rspamd-data-sw SeaweedFS PVC for rollback/archive."
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path-retain
  volumeMode: Filesystem
