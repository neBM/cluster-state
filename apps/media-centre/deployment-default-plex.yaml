apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: media-centre
    component: plex
  name: plex
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: media-centre
      component: plex
      managed-by: terraform
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        elastic.co/dataset: kubernetes.container_logs.media
      labels:
        app: media-centre
        component: plex
        managed-by: terraform
    spec:
      containers:
      - env:
        - name: TZ
          value: Europe/London
        - name: PLEX_UID
          value: '990'
        - name: PLEX_GID
          value: '997'
        - name: CHANGE_CONFIG_DIR_OWNERSHIP
          value: 'false'
        image: plexinc/pms-docker
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /identity
            port: 32400
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: plex
        ports:
        - containerPort: 32400
          name: plex
          protocol: TCP
        resources:
          claims:
          - name: gpu
          limits:
            cpu: '4'
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 300Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          mountPropagation: HostToContainer
          name: plex-config
        - mountPath: /config/Library/Application Support/Plex Media Server/Plug-in
            Support/Databases
          name: plex-data
          subPath: Databases
        - mountPath: /transcode
          name: transcode
        - mountPath: /tmp
          name: tmp
        - mountPath: /data
          name: media-docker
        - mountPath: /share
          name: media-share
      dnsPolicy: ClusterFirst
      initContainers:
      - args:
        - "set -e\nDB_DIR=\"/data/Databases\"\nLIBRARY_DB=\"$DB_DIR/com.plexapp.plugins.library.db\"\
          \nBLOBS_DB=\"$DB_DIR/com.plexapp.plugins.library.blobs.db\"\nmkdir -p \"\
          $DB_DIR\"\n\n# Skip if databases already exist\nif [ -f \"$LIBRARY_DB\"\
          \ ]; then\n  echo \"Databases already exist, skipping restore\"\n  exit\
          \ 0\nfi\n\necho \"No local database found - attempting restore from MinIO...\"\
          \necho \"CRITICAL: Plex will NOT start if restore fails\"\n\n# Install curl\
          \ for S3 API access\napk add --no-cache curl\n\n# Function to download latest\
          \ backup from MinIO\ndownload_latest() {\n  local prefix=$1\n  local output=$2\n\
          \  \n  echo \"Finding latest backup for $prefix...\"\n  \n  # List objects\
          \ and find the most recent one (use sed - alpine grep lacks -P)\n  LATEST=$(curl\
          \ -sf \\\n    --aws-sigv4 \"aws:amz:us-east-1:s3\" \\\n    --user \"$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY\"\
          \ \\\n    \"$MINIO_ENDPOINT/$BACKUP_BUCKET?prefix=$prefix&list-type=2\"\
          \ \\\n    2>/dev/null | sed -n 's/.*<Key>\\([^<]*\\)<\\/Key>.*/\\1/p' |\
          \ sort -r | head -1)\n  \n  if [ -z \"$LATEST\" ]; then\n    echo \"ERROR:\
          \ No backup found for $prefix\"\n    return 1\n  fi\n  \n  echo \"Downloading:\
          \ $LATEST\"\n  curl -sf \\\n    --aws-sigv4 \"aws:amz:us-east-1:s3\" \\\n\
          \    --user \"$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY\" \\\n    \"$MINIO_ENDPOINT/$BACKUP_BUCKET/$LATEST\"\
          \ \\\n    -o \"$output\"\n  \n  if [ ! -f \"$output\" ]; then\n    echo\
          \ \"ERROR: Download failed for $output\"\n    return 1\n  fi\n  \n  echo\
          \ \"Downloaded: $(stat -c%s \\\"$output\\\") bytes\"\n  return 0\n}\n\n\
          RESTORE_FAILED=0\n\necho \"Restoring library database...\"\nif download_latest\
          \ \"library/\" \"$LIBRARY_DB\"; then\n  echo \"Library database restored\
          \ successfully\"\nelse\n  echo \"ERROR: Library database restore failed!\"\
          \n  RESTORE_FAILED=1\nfi\n\necho \"Restoring blobs database...\"\nif download_latest\
          \ \"blobs/\" \"$BLOBS_DB\"; then\n  echo \"Blobs database restored successfully\"\
          \nelse\n  echo \"ERROR: Blobs database restore failed!\"\n  RESTORE_FAILED=1\n\
          fi\n\n# Final verification - BOTH databases must exist\nif [ ! -f \"$LIBRARY_DB\"\
          \ ]; then\n  echo \"FATAL: Library database does not exist after restore\
          \ attempt!\"\n  echo \"Plex cannot start without a valid database.\"\n \
          \ echo \"Please check MinIO connectivity and backup status.\"\n  exit 1\n\
          fi\n\nif [ ! -f \"$BLOBS_DB\" ]; then\n  echo \"FATAL: Blobs database does\
          \ not exist after restore attempt!\"\n  echo \"Plex cannot start without\
          \ a valid database.\"\n  exit 1\nfi\n\n# Verify databases are not empty\
          \ (minimum viable size check)\nLIBRARY_SIZE=$(stat -c%s \"$LIBRARY_DB\"\
          \ 2>/dev/null || echo \"0\")\nBLOBS_SIZE=$(stat -c%s \"$BLOBS_DB\" 2>/dev/null\
          \ || echo \"0\")\n\nif [ \"$LIBRARY_SIZE\" -lt 100000 ]; then\n  echo \"\
          FATAL: Library database is too small ($LIBRARY_SIZE bytes) - likely corrupted!\"\
          \n  echo \"Expected at least 100KB for a valid Plex database.\"\n  rm -f\
          \ \"$LIBRARY_DB\" \"$BLOBS_DB\"\n  exit 1\nfi\n\n# Skip integrity checks\
          \ due to Plex custom FTS tokenizer issues\n# Size check above is sufficient\
          \ - backups created with sqlite3 .backup are reliable\n\necho \"Restore\
          \ complete - Library: $LIBRARY_SIZE bytes, Blobs: $BLOBS_SIZE bytes\"\n"
        command:
        - /bin/sh
        - -c
        env:
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_ACCESS_KEY
              name: media-centre-secrets
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_SECRET_KEY
              name: media-centre-secrets
        - name: MINIO_ENDPOINT
          value: http://seaweedfs-s3.default.svc.cluster.local:8333
        - name: BACKUP_BUCKET
          value: plex-backup
        image: alpine
        imagePullPolicy: IfNotPresent
        name: db-restore
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: plex-data
      resourceClaims:
      - name: gpu
        resourceClaimName: hestia-gpu
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 997
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 30
      volumes:
      - name: plex-config
        persistentVolumeClaim:
          claimName: plex-config
      - emptyDir: {}
        name: transcode
      - emptyDir: {}
        name: tmp
      - name: media-docker
        persistentVolumeClaim:
          claimName: media-synology-docker
      - name: media-share
        persistentVolumeClaim:
          claimName: media-synology-share
      - name: plex-data
        persistentVolumeClaim:
          claimName: plex-data
