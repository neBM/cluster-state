apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: media-centre
    component: plex
  name: plex
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: media-centre
      component: plex
      managed-by: terraform
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        elastic.co/dataset: kubernetes.container_logs.media
      labels:
        app: media-centre
        component: plex
        managed-by: terraform
    spec:
      containers:
        - env:
            - name: TZ
              value: Europe/London
            - name: PLEX_UID
              value: '990'
            - name: PLEX_GID
              value: '997'
            - name: CHANGE_CONFIG_DIR_OWNERSHIP
              value: 'false'
          image: plexinc/pms-docker
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /identity
              port: 32400
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          name: plex
          ports:
            - containerPort: 32400
              name: plex
              protocol: TCP
          resources:
            claims:
              - name: gpu
            limits:
              cpu: '4'
              memory: 4Gi
            requests:
              cpu: 100m
              memory: 300Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /config
              mountPropagation: HostToContainer
              name: plex-config
            - mountPath: /config/Library/Application Support/Plex Media Server/Plug-in Support/Databases
              name: plex-data
              subPath: Databases
            - mountPath: /transcode
              name: transcode
            - mountPath: /tmp
              name: tmp
            - mountPath: /data
              name: media-docker
            - mountPath: /share
              name: media-share
      dnsPolicy: ClusterFirst
      initContainers:
        - args:
            - |
              set -e

              DB_DIR="/data/Databases"
              LIBRARY_DB="$DB_DIR/com.plexapp.plugins.library.db"
              BLOBS_DB="$DB_DIR/com.plexapp.plugins.library.blobs.db"
              mkdir -p "$DB_DIR"

              # Skip if databases already exist
              if [ -f "$LIBRARY_DB" ]; then
                echo "Databases already exist, skipping restore"
                exit 0
              fi

              echo "No local database found - attempting restore from SeaweedFS S3..."
              echo "CRITICAL: Plex will NOT start if restore fails"

              # Install curl for S3 API access
              apk add --no-cache curl

              COSI_BUCKET_INFO="/cosi/plex-backup/BucketInfo"

              parse_cosi_field() {
                sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$COSI_BUCKET_INFO"
              }

              load_cosi_bucket_info() {
                if [ ! -s "$COSI_BUCKET_INFO" ]; then
                  echo "ERROR: COSI BucketInfo secret is missing at $COSI_BUCKET_INFO"
                  exit 1
                fi

                MINIO_ENDPOINT=$(parse_cosi_field endpoint)
                S3_REGION=$(parse_cosi_field region)
                BACKUP_BUCKET=$(parse_cosi_field bucketName)
                MINIO_ACCESS_KEY=$(parse_cosi_field accessKeyID)
                MINIO_SECRET_KEY=$(parse_cosi_field accessSecretKey)

                if [ -z "$MINIO_ENDPOINT" ] || [ -z "$S3_REGION" ] || [ -z "$BACKUP_BUCKET" ] || [ -z "$MINIO_ACCESS_KEY" ] || [ -z "$MINIO_SECRET_KEY" ]; then
                  echo "ERROR: COSI BucketInfo is missing required S3 fields"
                  exit 1
                fi

                export MINIO_ENDPOINT S3_REGION BACKUP_BUCKET MINIO_ACCESS_KEY MINIO_SECRET_KEY
              }

              load_cosi_bucket_info

              # Function to download latest backup from SeaweedFS S3
              download_latest() {
                local prefix=$1
                local output=$2

                echo "Finding latest backup for $prefix..."

                # List objects and find the most recent one (use sed - alpine grep lacks -P)
                LATEST=$(curl -sf \
                  --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                  --user "$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY" \
                  "$MINIO_ENDPOINT/$BACKUP_BUCKET?prefix=$prefix&list-type=2" \
                  2>/dev/null | sed -n 's/.*<Key>\([^<]*\)<\/Key>.*/\1/p' | sort -r | head -1)

                if [ -z "$LATEST" ]; then
                  echo "ERROR: No backup found for $prefix"
                  return 1
                fi

                echo "Downloading: $LATEST"
                curl -sf \
                  --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                  --user "$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY" \
                  "$MINIO_ENDPOINT/$BACKUP_BUCKET/$LATEST" \
                  -o "$output"

                if [ ! -f "$output" ]; then
                  echo "ERROR: Download failed for $output"
                  return 1
                fi

                echo "Downloaded: $(stat -c%s "$output") bytes"
                return 0
              }

              RESTORE_FAILED=0

              echo "Restoring library database..."
              if download_latest "library/" "$LIBRARY_DB"; then
                echo "Library database restored successfully"
              else
                echo "ERROR: Library database restore failed!"
                RESTORE_FAILED=1
              fi

              echo "Restoring blobs database..."
              if download_latest "blobs/" "$BLOBS_DB"; then
                echo "Blobs database restored successfully"
              else
                echo "ERROR: Blobs database restore failed!"
                RESTORE_FAILED=1
              fi

              # Final verification - BOTH databases must exist
              if [ ! -f "$LIBRARY_DB" ]; then
                echo "FATAL: Library database does not exist after restore attempt!"
                echo "Plex cannot start without a valid database."
                echo "Please check SeaweedFS S3 connectivity and backup status."
                exit 1
              fi

              if [ ! -f "$BLOBS_DB" ]; then
                echo "FATAL: Blobs database does not exist after restore attempt!"
                echo "Plex cannot start without a valid database."
                exit 1
              fi

              # Verify databases are not empty (minimum viable size check)
              LIBRARY_SIZE=$(stat -c%s "$LIBRARY_DB" 2>/dev/null || echo "0")
              BLOBS_SIZE=$(stat -c%s "$BLOBS_DB" 2>/dev/null || echo "0")

              if [ "$LIBRARY_SIZE" -lt 100000 ]; then
                echo "FATAL: Library database is too small ($LIBRARY_SIZE bytes) - likely corrupted!"
                echo "Expected at least 100KB for a valid Plex database."
                rm -f "$LIBRARY_DB" "$BLOBS_DB"
                exit 1
              fi

              # Skip integrity checks due to Plex custom FTS tokenizer issues
              # Size check above is sufficient - backups created with sqlite3 .backup are reliable

              echo "Restore complete - Library: $LIBRARY_SIZE bytes, Blobs: $BLOBS_SIZE bytes"
          command:
            - /bin/sh
            - -c
          env: []
          image: alpine
          imagePullPolicy: IfNotPresent
          name: db-restore
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              name: plex-data
            - mountPath: /cosi/plex-backup
              name: plex-backup-cosi
              readOnly: true
      resourceClaims:
        - name: gpu
          resourceClaimName: hestia-gpu
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 997
        fsGroupChangePolicy: OnRootMismatch
      terminationGracePeriodSeconds: 30
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: plex-config
        - emptyDir: {}
          name: transcode
        - emptyDir: {}
          name: tmp
        - name: media-docker
          persistentVolumeClaim:
            claimName: media-synology-docker
        - name: media-share
          persistentVolumeClaim:
            claimName: media-synology-share
        - name: plex-data
          persistentVolumeClaim:
            claimName: plex-data
        - name: plex-backup-cosi
          secret:
            secretName: plex-backup-s3
