apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: media-centre
    component: plex-backup
  name: plex-db-backup
  namespace: default
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: media-centre
        component: plex-backup
    spec:
      backoffLimit: 2
      completions: 1
      manualSelector: false
      parallelism: 1
      template:
        metadata:
          labels:
            app: media-centre
            component: plex-backup
        spec:
          automountServiceAccountToken: true
          containers:
            - args:
                - |
                  set -e

                  echo "=== Plex Database Backup - $(date -Iseconds) ==="

                  # Install required tools
                  apk add --no-cache sqlite curl

                  COSI_BUCKET_INFO="/cosi/plex-backup/BucketInfo"

                  parse_cosi_field() {
                    sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$COSI_BUCKET_INFO"
                  }

                  load_cosi_bucket_info() {
                    if [ ! -s "$COSI_BUCKET_INFO" ]; then
                      echo "ERROR: COSI BucketInfo secret is missing at $COSI_BUCKET_INFO"
                      exit 1
                    fi

                    MINIO_ENDPOINT=$(parse_cosi_field endpoint)
                    S3_REGION=$(parse_cosi_field region)
                    BACKUP_BUCKET=$(parse_cosi_field bucketName)
                    MINIO_ACCESS_KEY=$(parse_cosi_field accessKeyID)
                    MINIO_SECRET_KEY=$(parse_cosi_field accessSecretKey)

                    if [ -z "$MINIO_ENDPOINT" ] || [ -z "$S3_REGION" ] || [ -z "$BACKUP_BUCKET" ] || [ -z "$MINIO_ACCESS_KEY" ] || [ -z "$MINIO_SECRET_KEY" ]; then
                      echo "ERROR: COSI BucketInfo is missing required S3 fields"
                      exit 1
                    fi

                    export MINIO_ENDPOINT S3_REGION BACKUP_BUCKET MINIO_ACCESS_KEY MINIO_SECRET_KEY
                  }

                  load_cosi_bucket_info

                  DB_DIR="/plex-data/Databases"
                  LIBRARY_DB="$DB_DIR/com.plexapp.plugins.library.db"
                  BLOBS_DB="$DB_DIR/com.plexapp.plugins.library.blobs.db"
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  # Verify source databases exist
                  if [ ! -f "$LIBRARY_DB" ]; then
                    echo "ERROR: Library database not found at $LIBRARY_DB"
                    exit 1
                  fi

                  if [ ! -f "$BLOBS_DB" ]; then
                    echo "ERROR: Blobs database not found at $BLOBS_DB"
                    exit 1
                  fi

                  # Function to backup a database
                  backup_db() {
                    local src=$1
                    local name=$2
                    local backup_file="/tmp/${name}-${TIMESTAMP}.db"
                    local s3_key="$name/${name}-${TIMESTAMP}.db"

                    echo "Backing up $name..."

                    # sqlite3 .backup is atomic and safe during writes
                    # It acquires a read lock and copies consistently
                    if ! sqlite3 "$src" ".backup '$backup_file'"; then
                      echo "ERROR: sqlite3 backup failed for $name"
                      return 1
                    fi

                    # sqlite3 .backup is atomic and reliable - just verify file size
                    # Skip integrity checks due to Plex custom FTS tokenizer issues
                    local size=$(stat -c%s "$backup_file")
                    if [ "$size" -lt 10000 ]; then
                      echo "ERROR: Backup too small ($size bytes) for $name"
                      rm -f "$backup_file"
                      return 1
                    fi
                    echo "Backup created: $size bytes"

                    # Upload to SeaweedFS S3 using AWS SigV4
                    echo "Uploading to SeaweedFS S3: $s3_key"
                    if ! curl -sf -X PUT \
                      --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                      --user "$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY" \
                      -H "Content-Type: application/octet-stream" \
                      --data-binary "@$backup_file" \
                      "$MINIO_ENDPOINT/$BACKUP_BUCKET/$s3_key"; then
                      echo "ERROR: Upload failed for $name"
                      rm -f "$backup_file"
                      return 1
                    fi

                    rm -f "$backup_file"
                    echo "$name backup complete: $s3_key"
                    return 0
                  }

                  # Function to cleanup old backups (keep last N)
                  cleanup_old_backups() {
                    local prefix=$1
                    local keep=$2

                    echo "Cleaning up old backups for $prefix (keeping last $keep)..."

                    # List all objects with prefix (use sed - busybox grep lacks -P)
                    OBJECTS=$(curl -sf \
                      --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                      --user "$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY" \
                      "$MINIO_ENDPOINT/$BACKUP_BUCKET?prefix=$prefix&list-type=2" \
                      2>/dev/null | sed -n 's/.*<Key>\([^<]*\)<\/Key>.*/\1/p' | sort -r)

                    # Skip the first N (newest), delete the rest
                    printf '%s\n' "$OBJECTS" | tail -n +$((keep + 1)) | while read -r key; do
                      if [ -n "$key" ]; then
                        echo "Deleting old backup: $key"
                        curl -sf -X DELETE \
                          --aws-sigv4 "aws:amz:${S3_REGION}:s3" \
                          --user "$MINIO_ACCESS_KEY:$MINIO_SECRET_KEY" \
                          "$MINIO_ENDPOINT/$BACKUP_BUCKET/$key" || true
                      fi
                    done
                  }

                  # Perform backups
                  FAILED=0

                  backup_db "$LIBRARY_DB" "library" || FAILED=1
                  backup_db "$BLOBS_DB" "blobs" || FAILED=1

                  if [ "$FAILED" -eq 1 ]; then
                    echo "ERROR: One or more backups failed!"
                    exit 1
                  fi

                  # Cleanup old backups (keep last 48 = 24 hours at 30-min intervals)
                  cleanup_old_backups "library/" 48
                  cleanup_old_backups "blobs/" 48

                  echo "=== Backup complete ==="
              command:
                - /bin/sh
                - -c
              env: []
              image: alpine
              imagePullPolicy: IfNotPresent
              name: backup
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              volumeMounts:
                - mountPath: /plex-data
                  mountPropagation: None
                  name: plex-data
                  readOnly: true
                - mountPath: /cosi/plex-backup
                  name: plex-backup-cosi
                  readOnly: true
          dnsPolicy: ClusterFirst
          enableServiceLinks: true
          nodeSelector:
            kubernetes.io/hostname: hestia
          restartPolicy: Never
          schedulerName: default-scheduler
          securityContext: {}
          shareProcessNamespace: false
          terminationGracePeriodSeconds: 30
          volumes:
            - name: plex-data
              persistentVolumeClaim:
                claimName: plex-data
            - name: plex-backup-cosi
              secret:
                secretName: plex-backup-s3
      ttlSecondsAfterFinished: 3600
  schedule: '*/30 * * * *'
  successfulJobsHistoryLimit: 3
  suspend: false
