apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keycloak
    environment: prod
  name: keycloak
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
        environment: prod
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - start
        env:
        - name: KC_DB
          value: postgres
        - name: KC_DB_USERNAME
          value: keycloak
        - name: KC_DB_URL_HOST
          value: 192.168.1.10
        - name: KC_DB_URL_PORT
          value: '5433'
        - name: KC_DB_URL_DATABASE
          value: keycloak
        - name: KC_DB_URL_PROPERTIES
          value: ?sslmode=disable
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: KC_DB_PASSWORD
              name: keycloak-secrets
              optional: false
        - name: KC_HTTP_ENABLED
          value: 'true'
        - name: KC_PROXY_HEADERS
          value: xforwarded
        - name: KC_HTTP_HOST
          value: 0.0.0.0
        - name: KC_HOSTNAME
          value: sso.brmartin.co.uk
        - name: KC_HEALTH_ENABLED
          value: 'true'
        - name: KC_METRICS_ENABLED
          value: 'true'
        - name: JAVA_OPTS_KC_HEAP
          value: -Xms200m -Xmx512m
        image: quay.io/keycloak/keycloak:26.6.1
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /health/live
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        name: keycloak
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9000
          name: management
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/ready
            port: 9000
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 768Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
