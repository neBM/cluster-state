apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: seerr
    environment: prod
  name: seerr
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: seerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seerr
        environment: prod
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                      - amd64
      automountServiceAccountToken: true
      containers:
        - env:
            - name: TZ
              value: Europe/London
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: 192.168.1.10
            - name: DB_PORT
              value: '5433'
            - name: DB_USER
              value: seerr
            - name: DB_NAME
              value: seerr
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  key: DB_PASS
                  name: seerr-secrets
                  optional: false
          image: ghcr.io/seerr-team/seerr
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/settings/public
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: seerr
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/settings/public
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 350Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/config
              mountPropagation: HostToContainer
              name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -eu

              mkdir -p /config

              if [ ! -f /config/settings.json ]; then
                echo "Initializing Seerr config PVC from Overseerr rollback PVC"
                for entry in /legacy/settings.json /legacy/settings.json.uninitialized-* /legacy/cache /legacy/logs; do
                  if [ -e "$entry" ]; then
                    cp -a "$entry" /config/
                  fi
                done
              else
                echo "Seerr config PVC already initialized"
              fi

              mkdir -p /config/cache /config/logs /config/db /config/migration/postgres-import
              chown -R 1000:1000 /config
          image: busybox
          imagePullPolicy: IfNotPresent
          name: prepare-config-and-data
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /config
              mountPropagation: HostToContainer
              name: config
            - mountPath: /legacy
              mountPropagation: HostToContainer
              name: legacy-config
              readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config-sw
        - name: legacy-config
          persistentVolumeClaim:
            claimName: overseerr-config-sw
