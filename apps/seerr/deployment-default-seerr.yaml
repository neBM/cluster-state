apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: seerr
    environment: prod
  name: seerr
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: seerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: seerr
        environment: prod
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                      - amd64
      automountServiceAccountToken: true
      containers:
        - env:
            - name: TZ
              value: Europe/London
          image: ghcr.io/seerr-team/seerr
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/settings/public
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: seerr
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/settings/public
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 350Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/config
              mountPropagation: HostToContainer
              name: config
            - mountPath: /app/config/db
              mountPropagation: None
              name: data
              subPath: db
        - args:
            - |
              set -eu

              COSI_BUCKET_INFO="/cosi/seerr-litestream/BucketInfo"
              LITESTREAM_CONFIG="/tmp/litestream.yml"

              parse_cosi_field() {
                sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$2"
              }

              load_cosi_bucket_info() {
                if [ ! -s "$COSI_BUCKET_INFO" ]; then
                  echo "ERROR: COSI BucketInfo secret is missing at $COSI_BUCKET_INFO"
                  exit 1
                fi

                LITESTREAM_BUCKET=$(parse_cosi_field bucketName "$COSI_BUCKET_INFO")
                LITESTREAM_ENDPOINT=$(parse_cosi_field endpoint "$COSI_BUCKET_INFO")
                LITESTREAM_ACCESS_KEY_ID=$(parse_cosi_field accessKeyID "$COSI_BUCKET_INFO")
                LITESTREAM_SECRET_ACCESS_KEY=$(parse_cosi_field accessSecretKey "$COSI_BUCKET_INFO")

                if [ "$LITESTREAM_BUCKET" != "seerr-litestream" ] || [ -z "$LITESTREAM_ENDPOINT" ] || [ -z "$LITESTREAM_ACCESS_KEY_ID" ] || [ -z "$LITESTREAM_SECRET_ACCESS_KEY" ]; then
                  echo "ERROR: COSI BucketInfo is missing required Seerr S3 fields"
                  exit 1
                fi
              }

              write_litestream_config() {
                cat > "$LITESTREAM_CONFIG" <<EOF
              dbs:
              - path: /data/db/db.sqlite3
                replicas:
                - bucket: ${LITESTREAM_BUCKET}
                  endpoint: ${LITESTREAM_ENDPOINT}
                  force-path-style: true
                  name: seerr
                  path: db
                  retention: 168h
                  retention-check-interval: 1h
                  snapshot-interval: 1h
                  sync-interval: 5m
                  type: s3
              EOF
              }

              load_cosi_bucket_info
              write_litestream_config
              export LITESTREAM_ACCESS_KEY_ID LITESTREAM_SECRET_ACCESS_KEY
              exec litestream replicate -config "$LITESTREAM_CONFIG"
          command:
            - /bin/sh
            - -c
          image: litestream/litestream
          imagePullPolicy: IfNotPresent
          name: litestream
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              mountPropagation: None
              name: data
            - mountPath: /cosi/seerr-litestream
              name: seerr-litestream-cosi
              readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -eu

              mkdir -p /config /data/db

              if [ ! -f /config/settings.json ]; then
                echo "Initializing Seerr config PVC from Overseerr rollback PVC"
                for entry in /legacy/settings.json /legacy/settings.json.uninitialized-* /legacy/cache /legacy/logs; do
                  if [ -e "$entry" ]; then
                    cp -a "$entry" /config/
                  fi
                done
              else
                echo "Seerr config PVC already initialized"
              fi

              mkdir -p /config/cache /config/logs /config/db /data/db
              chown -R 1000:1000 /config /data
          image: busybox
          imagePullPolicy: IfNotPresent
          name: prepare-config-and-data
          resources: {}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /config
              mountPropagation: HostToContainer
              name: config
            - mountPath: /data
              mountPropagation: None
              name: data
            - mountPath: /legacy
              mountPropagation: HostToContainer
              name: legacy-config
              readOnly: true
        - args:
            - |
              set -eu

              DB_DIR="/data/db"
              DB_FILE="$DB_DIR/db.sqlite3"
              RESTORE_MARKER="$DB_DIR/.restore-complete"
              NEW_BUCKET_INFO="/cosi/seerr-litestream/BucketInfo"
              LEGACY_BUCKET_INFO="/cosi/overseerr-litestream/BucketInfo"
              NEW_CONFIG="/tmp/litestream-seerr.yml"
              LEGACY_CONFIG="/tmp/litestream-overseerr.yml"

              mkdir -p "$DB_DIR"

              if [ -f "$RESTORE_MARKER" ] && [ -f "$DB_FILE" ]; then
                echo "Database restore already completed for this pod"
                exit 0
              fi

              rm -f "$RESTORE_MARKER" "$DB_FILE" "$DB_FILE-wal" "$DB_FILE-shm"

              echo "No completed local restore found - attempting Seerr restore with Overseerr fallback..."
              echo "CRITICAL: Seerr will NOT start if restore fails to prevent empty database creation"

              parse_cosi_field() {
                sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$2"
              }

              load_bucket_info() {
                PREFIX="$1"
                BUCKET_INFO="$2"
                EXPECTED_BUCKET="$3"

                if [ ! -s "$BUCKET_INFO" ]; then
                  echo "ERROR: COSI BucketInfo secret is missing at $BUCKET_INFO"
                  exit 1
                fi

                BUCKET=$(parse_cosi_field bucketName "$BUCKET_INFO")
                ENDPOINT=$(parse_cosi_field endpoint "$BUCKET_INFO")
                ACCESS_KEY_ID=$(parse_cosi_field accessKeyID "$BUCKET_INFO")
                SECRET_ACCESS_KEY=$(parse_cosi_field accessSecretKey "$BUCKET_INFO")

                if [ "$BUCKET" != "$EXPECTED_BUCKET" ] || [ -z "$ENDPOINT" ] || [ -z "$ACCESS_KEY_ID" ] || [ -z "$SECRET_ACCESS_KEY" ]; then
                  echo "ERROR: COSI BucketInfo is missing required S3 fields for $EXPECTED_BUCKET"
                  exit 1
                fi

                eval "${PREFIX}_BUCKET=\$BUCKET"
                eval "${PREFIX}_ENDPOINT=\$ENDPOINT"
                eval "${PREFIX}_ACCESS_KEY_ID=\$ACCESS_KEY_ID"
                eval "${PREFIX}_SECRET_ACCESS_KEY=\$SECRET_ACCESS_KEY"
              }

              write_litestream_config() {
                CONFIG_PATH="$1"
                REPLICA_NAME="$2"
                BUCKET="$3"
                ENDPOINT="$4"

                cat > "$CONFIG_PATH" <<EOF
              dbs:
              - path: /data/db/db.sqlite3
                replicas:
                - bucket: ${BUCKET}
                  endpoint: ${ENDPOINT}
                  force-path-style: true
                  name: ${REPLICA_NAME}
                  path: db
                  retention: 168h
                  retention-check-interval: 1h
                  snapshot-interval: 1h
                  sync-interval: 5m
                  type: s3
              EOF
              }

              restore_from_replica() {
                CONFIG_PATH="$1"
                ACCESS_KEY_ID="$2"
                SECRET_ACCESS_KEY="$3"
                SOURCE_LABEL="$4"

                rm -f "$DB_FILE"
                if LITESTREAM_ACCESS_KEY_ID="$ACCESS_KEY_ID" LITESTREAM_SECRET_ACCESS_KEY="$SECRET_ACCESS_KEY" \
                  litestream restore -config "$CONFIG_PATH" -o "$DB_FILE" "$DB_FILE"; then
                  echo "Database restored successfully from $SOURCE_LABEL"
                  return 0
                fi

                return 1
              }

              load_bucket_info "NEW" "$NEW_BUCKET_INFO" "seerr-litestream"
              load_bucket_info "LEGACY" "$LEGACY_BUCKET_INFO" "overseerr-litestream"

              write_litestream_config "$NEW_CONFIG" "seerr" "$NEW_BUCKET" "$NEW_ENDPOINT"
              write_litestream_config "$LEGACY_CONFIG" "overseerr-legacy" "$LEGACY_BUCKET" "$LEGACY_ENDPOINT"

              if restore_from_replica "$NEW_CONFIG" "$NEW_ACCESS_KEY_ID" "$NEW_SECRET_ACCESS_KEY" "seerr-litestream"; then
                RESTORE_SOURCE="seerr-litestream"
              elif restore_from_replica "$LEGACY_CONFIG" "$LEGACY_ACCESS_KEY_ID" "$LEGACY_SECRET_ACCESS_KEY" "overseerr-litestream"; then
                RESTORE_SOURCE="overseerr-litestream"
              else
                echo "ERROR: Database restore failed from both Seerr and Overseerr buckets!"
                echo "FATAL: No database available. Seerr cannot start."
                echo "Please check SeaweedFS S3 connectivity and litestream backup status."
                exit 1
              fi

              if [ ! -f "$DB_FILE" ]; then
                echo "FATAL: Database file does not exist after restore attempt!"
                exit 1
              fi

              DB_SIZE=$(stat -c%s "$DB_FILE" 2>/dev/null || echo "0")
              if [ "$DB_SIZE" -lt 50000 ]; then
                echo "FATAL: Database is too small ($DB_SIZE bytes) - likely corrupted or empty!"
                echo "Expected at least 50KB for a valid Seerr database."
                rm -f "$DB_FILE"
                exit 1
              fi

              echo "Seeding Seerr litestream bucket after restore from $RESTORE_SOURCE"
              LITESTREAM_ACCESS_KEY_ID="$NEW_ACCESS_KEY_ID" LITESTREAM_SECRET_ACCESS_KEY="$NEW_SECRET_ACCESS_KEY" \
                litestream replicate -config "$NEW_CONFIG" -once -force-snapshot

              touch "$RESTORE_MARKER"
              echo "Restore complete - Database: ${DB_SIZE} bytes"
          command:
            - /bin/sh
            - -c
          image: litestream/litestream
          imagePullPolicy: IfNotPresent
          name: litestream-restore
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              mountPropagation: None
              name: data
            - mountPath: /cosi/seerr-litestream
              name: seerr-litestream-cosi
              readOnly: true
            - mountPath: /cosi/overseerr-litestream
              name: overseerr-litestream-cosi
              readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir:
            sizeLimit: 500Mi
          name: data
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config-sw
        - name: legacy-config
          persistentVolumeClaim:
            claimName: overseerr-config-sw
        - name: seerr-litestream-cosi
          secret:
            secretName: seerr-litestream-s3
        - name: overseerr-litestream-cosi
          secret:
            secretName: overseerr-litestream-s3
