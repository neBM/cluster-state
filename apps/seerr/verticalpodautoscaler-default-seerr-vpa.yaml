apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app: seerr
    environment: prod
  name: seerr-vpa
  namespace: default
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: seerr
      maxAllowed:
        cpu: '1'
        memory: 1Gi
      minAllowed:
        cpu: 50m
        memory: 128Mi
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seerr
  updatePolicy:
    updateMode: 'Off'
