apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: overseerr
    environment: prod
  name: overseerr
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: overseerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: overseerr
        environment: prod
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - preference:
                matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
              weight: 100
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                      - amd64
      automountServiceAccountToken: true
      containers:
        - env:
            - name: TZ
              value: Europe/London
          image: sctx/overseerr
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/status
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          name: overseerr
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/v1/status
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 350Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /app/config
              mountPropagation: HostToContainer
              name: config
            - mountPath: /app/config/db
              mountPropagation: None
              name: data
              subPath: db
        - args:
            - |
              set -e

              COSI_BUCKET_INFO="/cosi/overseerr-litestream/BucketInfo"
              LITESTREAM_CONFIG="/tmp/litestream.yml"

              parse_cosi_field() {
                sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$COSI_BUCKET_INFO"
              }

              load_cosi_bucket_info() {
                if [ ! -s "$COSI_BUCKET_INFO" ]; then
                  echo "ERROR: COSI BucketInfo secret is missing at $COSI_BUCKET_INFO"
                  exit 1
                fi

                LITESTREAM_BUCKET=$(parse_cosi_field bucketName)
                LITESTREAM_ENDPOINT=$(parse_cosi_field endpoint)
                LITESTREAM_ACCESS_KEY_ID=$(parse_cosi_field accessKeyID)
                LITESTREAM_SECRET_ACCESS_KEY=$(parse_cosi_field accessSecretKey)

                if [ "$LITESTREAM_BUCKET" != "overseerr-litestream" ] || [ -z "$LITESTREAM_ENDPOINT" ] || [ -z "$LITESTREAM_ACCESS_KEY_ID" ] || [ -z "$LITESTREAM_SECRET_ACCESS_KEY" ]; then
                  echo "ERROR: COSI BucketInfo is missing required Overseerr S3 fields"
                  exit 1
                fi

                export LITESTREAM_ACCESS_KEY_ID LITESTREAM_SECRET_ACCESS_KEY
              }

              write_litestream_config() {
                cat > "$LITESTREAM_CONFIG" <<EOF
              dbs:
              - path: /data/db/db.sqlite3
                replicas:
                - bucket: ${LITESTREAM_BUCKET}
                  endpoint: ${LITESTREAM_ENDPOINT}
                  force-path-style: true
                  name: overseerr
                  path: db
                  retention: 168h
                  retention-check-interval: 1h
                  snapshot-interval: 1h
                  sync-interval: 5m
                  type: s3
              EOF
              }

              load_cosi_bucket_info
              write_litestream_config
              exec litestream replicate -config "$LITESTREAM_CONFIG"
          command:
            - /bin/sh
            - -c
          env: []
          image: litestream/litestream
          imagePullPolicy: IfNotPresent
          name: litestream
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              mountPropagation: None
              name: data
            - mountPath: /cosi/overseerr-litestream
              name: overseerr-litestream-cosi
              readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
        - args:
            - |
              set -e

              DB_DIR="/data/db"
              DB_FILE="$DB_DIR/db.sqlite3"
              mkdir -p "$DB_DIR"

              # Skip if database already exists
              if [ -f "$DB_FILE" ]; then
                echo "Database already exists, skipping restore"
                exit 0
              fi

              echo "No local database found - attempting restore from SeaweedFS S3..."
              echo "CRITICAL: Overseerr will NOT start if restore fails to prevent empty database creation"

              COSI_BUCKET_INFO="/cosi/overseerr-litestream/BucketInfo"
              LITESTREAM_CONFIG="/tmp/litestream.yml"

              parse_cosi_field() {
                sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$COSI_BUCKET_INFO"
              }

              load_cosi_bucket_info() {
                if [ ! -s "$COSI_BUCKET_INFO" ]; then
                  echo "ERROR: COSI BucketInfo secret is missing at $COSI_BUCKET_INFO"
                  exit 1
                fi

                LITESTREAM_BUCKET=$(parse_cosi_field bucketName)
                LITESTREAM_ENDPOINT=$(parse_cosi_field endpoint)
                LITESTREAM_ACCESS_KEY_ID=$(parse_cosi_field accessKeyID)
                LITESTREAM_SECRET_ACCESS_KEY=$(parse_cosi_field accessSecretKey)

                if [ "$LITESTREAM_BUCKET" != "overseerr-litestream" ] || [ -z "$LITESTREAM_ENDPOINT" ] || [ -z "$LITESTREAM_ACCESS_KEY_ID" ] || [ -z "$LITESTREAM_SECRET_ACCESS_KEY" ]; then
                  echo "ERROR: COSI BucketInfo is missing required Overseerr S3 fields"
                  exit 1
                fi

                export LITESTREAM_ACCESS_KEY_ID LITESTREAM_SECRET_ACCESS_KEY
              }

              write_litestream_config() {
                cat > "$LITESTREAM_CONFIG" <<EOF
              dbs:
              - path: /data/db/db.sqlite3
                replicas:
                - bucket: ${LITESTREAM_BUCKET}
                  endpoint: ${LITESTREAM_ENDPOINT}
                  force-path-style: true
                  name: overseerr
                  path: db
                  retention: 168h
                  retention-check-interval: 1h
                  snapshot-interval: 1h
                  sync-interval: 5m
                  type: s3
              EOF
              }

              load_cosi_bucket_info
              write_litestream_config

              if litestream restore -config "$LITESTREAM_CONFIG" -o "$DB_FILE" "$DB_FILE"; then
                echo "Database restored successfully from SeaweedFS S3"
              else
                echo "ERROR: Database restore failed!"
                echo "FATAL: No database available. Overseerr cannot start."
                echo "Please check SeaweedFS S3 connectivity and litestream backup status."
                exit 1
              fi

              # Verify database exists after restore
              if [ ! -f "$DB_FILE" ]; then
                echo "FATAL: Database file does not exist after restore attempt!"
                exit 1
              fi

              # Verify database is not empty/corrupted (Overseerr DB is typically 160KB+)
              DB_SIZE=$(stat -c%s "$DB_FILE" 2>/dev/null || echo "0")
              if [ "$DB_SIZE" -lt 50000 ]; then
                echo "FATAL: Database is too small ($DB_SIZE bytes) - likely corrupted or empty!"
                echo "Expected at least 50KB for a valid Overseerr database."
                rm -f "$DB_FILE"
                exit 1
              fi

              echo "Restore complete - Database: ${DB_SIZE} bytes"
          command:
            - /bin/sh
            - -c
          env: []
          envFrom: []
          image: litestream/litestream
          imagePullPolicy: IfNotPresent
          name: litestream-restore
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /data
              mountPropagation: None
              name: data
            - mountPath: /cosi/overseerr-litestream
              name: overseerr-litestream-cosi
              readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir:
            sizeLimit: 500Mi
          name: data
        - name: config
          persistentVolumeClaim:
            claimName: overseerr-config-sw
        - name: overseerr-litestream-cosi
          secret:
            secretName: overseerr-litestream-s3
