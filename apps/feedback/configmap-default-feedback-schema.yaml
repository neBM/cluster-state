apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: feedback-api
  name: feedback-schema
  namespace: default
data:
  schema.sql: |
    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'feedback_public') THEN
        RAISE EXCEPTION 'required role feedback_public does not exist';
      END IF;
    END
    $$;

    CREATE SCHEMA IF NOT EXISTS api;
    CREATE SCHEMA IF NOT EXISTS feedback_private;

    REVOKE ALL ON SCHEMA api FROM PUBLIC;
    REVOKE ALL ON SCHEMA feedback_private FROM PUBLIC;

    CREATE TABLE IF NOT EXISTS feedback_private.feedback_items (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      project TEXT NOT NULL,
      feedback_type TEXT NOT NULL,
      title TEXT NOT NULL,
      body TEXT NOT NULL,
      installation_id TEXT,
      app_version TEXT,
      contact TEXT,
      client_context JSONB NOT NULL DEFAULT '{}'::jsonb,
      status TEXT NOT NULL DEFAULT 'new',
      created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
      CONSTRAINT feedback_project_format CHECK (project ~ '^[a-z0-9][a-z0-9_-]{0,63}$'),
      CONSTRAINT feedback_type_allowed CHECK (feedback_type IN ('feature_request', 'bug_report', 'general')),
      CONSTRAINT feedback_title_length CHECK (char_length(title) BETWEEN 3 AND 160),
      CONSTRAINT feedback_body_length CHECK (char_length(body) BETWEEN 1 AND 10000),
      CONSTRAINT feedback_installation_length CHECK (installation_id IS NULL OR char_length(installation_id) <= 128),
      CONSTRAINT feedback_version_length CHECK (app_version IS NULL OR char_length(app_version) <= 64),
      CONSTRAINT feedback_contact_length CHECK (contact IS NULL OR char_length(contact) <= 320),
      CONSTRAINT feedback_context_object CHECK (jsonb_typeof(client_context) = 'object'),
      CONSTRAINT feedback_context_length CHECK (octet_length(client_context::text) <= 16384),
      CONSTRAINT feedback_status_allowed CHECK (status IN ('new', 'triaged', 'accepted', 'declined', 'closed'))
    );

    ALTER TABLE feedback_private.feedback_items ENABLE ROW LEVEL SECURITY;

    CREATE INDEX IF NOT EXISTS feedback_items_project_created_idx
      ON feedback_private.feedback_items (project, created_at DESC);
    CREATE INDEX IF NOT EXISTS feedback_items_status_created_idx
      ON feedback_private.feedback_items (status, created_at DESC);
    CREATE INDEX IF NOT EXISTS feedback_items_installation_idx
      ON feedback_private.feedback_items (project, installation_id)
      WHERE installation_id IS NOT NULL;

    CREATE OR REPLACE FUNCTION feedback_private.touch_updated_at()
    RETURNS TRIGGER
    LANGUAGE plpgsql
    AS $$
    BEGIN
      NEW.updated_at = now();
      RETURN NEW;
    END;
    $$;

    DROP TRIGGER IF EXISTS feedback_items_touch_updated_at
      ON feedback_private.feedback_items;
    CREATE TRIGGER feedback_items_touch_updated_at
      BEFORE UPDATE ON feedback_private.feedback_items
      FOR EACH ROW
      EXECUTE FUNCTION feedback_private.touch_updated_at();

    CREATE OR REPLACE FUNCTION api.submit_feedback(
      project TEXT,
      kind TEXT,
      title TEXT,
      body TEXT,
      installation_id TEXT DEFAULT NULL,
      app_version TEXT DEFAULT NULL,
      contact TEXT DEFAULT NULL,
      client_context JSONB DEFAULT '{}'::jsonb
    )
    RETURNS JSONB
    LANGUAGE plpgsql
    SECURITY DEFINER
    SET search_path = feedback_private, pg_temp
    AS $$
    DECLARE
      normalized_project TEXT := lower(btrim(project));
      normalized_kind TEXT := lower(btrim(kind));
      normalized_title TEXT := btrim(title);
      normalized_body TEXT := btrim(body);
      normalized_installation_id TEXT := nullif(btrim(installation_id), '');
      normalized_app_version TEXT := nullif(btrim(app_version), '');
      normalized_contact TEXT := nullif(btrim(contact), '');
      normalized_context JSONB := coalesce(client_context, '{}'::jsonb);
      inserted_id UUID;
      inserted_at TIMESTAMPTZ;
    BEGIN
      IF normalized_project IS NULL OR normalized_project !~ '^[a-z0-9][a-z0-9_-]{0,63}$' THEN
        RAISE EXCEPTION 'invalid project' USING ERRCODE = '22023';
      END IF;

      IF normalized_kind NOT IN ('feature_request', 'bug_report', 'general') THEN
        RAISE EXCEPTION 'invalid kind' USING ERRCODE = '22023';
      END IF;

      IF normalized_title IS NULL OR char_length(normalized_title) NOT BETWEEN 3 AND 160 THEN
        RAISE EXCEPTION 'invalid title length' USING ERRCODE = '22023';
      END IF;

      IF normalized_body IS NULL OR char_length(normalized_body) NOT BETWEEN 1 AND 10000 THEN
        RAISE EXCEPTION 'invalid body length' USING ERRCODE = '22023';
      END IF;

      IF normalized_installation_id IS NOT NULL AND char_length(normalized_installation_id) > 128 THEN
        RAISE EXCEPTION 'invalid installation_id length' USING ERRCODE = '22023';
      END IF;

      IF normalized_app_version IS NOT NULL AND char_length(normalized_app_version) > 64 THEN
        RAISE EXCEPTION 'invalid app_version length' USING ERRCODE = '22023';
      END IF;

      IF normalized_contact IS NOT NULL AND char_length(normalized_contact) > 320 THEN
        RAISE EXCEPTION 'invalid contact length' USING ERRCODE = '22023';
      END IF;

      IF jsonb_typeof(normalized_context) <> 'object' OR octet_length(normalized_context::text) > 16384 THEN
        RAISE EXCEPTION 'invalid client_context' USING ERRCODE = '22023';
      END IF;

      INSERT INTO feedback_items (
        project,
        feedback_type,
        title,
        body,
        installation_id,
        app_version,
        contact,
        client_context
      )
      VALUES (
        normalized_project,
        normalized_kind,
        normalized_title,
        normalized_body,
        normalized_installation_id,
        normalized_app_version,
        normalized_contact,
        normalized_context
      )
      RETURNING id, created_at INTO inserted_id, inserted_at;

      RETURN jsonb_build_object(
        'id', inserted_id,
        'status', 'accepted',
        'created_at', inserted_at
      );
    END;
    $$;

    REVOKE ALL ON FUNCTION api.submit_feedback(TEXT, TEXT, TEXT, TEXT, TEXT, TEXT, TEXT, JSONB) FROM PUBLIC;
    GRANT USAGE ON SCHEMA api TO feedback_public;
    GRANT EXECUTE ON FUNCTION api.submit_feedback(TEXT, TEXT, TEXT, TEXT, TEXT, TEXT, TEXT, JSONB) TO feedback_public;

    ALTER DEFAULT PRIVILEGES IN SCHEMA api REVOKE EXECUTE ON FUNCTIONS FROM PUBLIC;
