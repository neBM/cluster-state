apiVersion: v1
data:
  config.js: "// Runtime configuration for Athenaeum frontend\n// This file is injected\
    \ by Kubernetes and loaded before the app starts\nwindow.APP_CONFIG = {\n  apiUrl:\
    \ 'https://athenaeum.brmartin.co.uk',\n  wsUrl: 'wss://athenaeum.brmartin.co.uk',\n\
    \  keycloak: {\n    url: 'https://sso.brmartin.co.uk',\n    realm: 'prod',\n \
    \   clientId: 'athenaeum-ui'\n  }\n};\n"
immutable: false
kind: ConfigMap
metadata:
  labels:
    app: athenaeum
    component: frontend
  name: athenaeum-frontend-config
  namespace: default
