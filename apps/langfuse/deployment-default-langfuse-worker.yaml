apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: langfuse
    component: worker
  name: langfuse-worker
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: langfuse
      component: worker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: langfuse
        component: worker
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: NEXTAUTH_URL
          value: https://langfuse.brmartin.co.uk
        - name: TELEMETRY_ENABLED
          value: 'false'
        - name: CLICKHOUSE_MIGRATION_URL
          value: clickhouse://clickhouse.default.svc.cluster.local:9000
        - name: CLICKHOUSE_URL
          value: http://clickhouse.default.svc.cluster.local:8123
        - name: CLICKHOUSE_USER
          value: default
        - name: REDIS_CONNECTION_STRING
          value: redis://valkey.default.svc.cluster.local:6379/0
        - name: LANGFUSE_S3_EVENT_UPLOAD_ENABLED
          value: 'true'
        - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
          value: langfuse
        - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
          value: http://seaweedfs-s3.default.svc.cluster.local:8333
        - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
          value: us-east-1
        - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
          value: 'true'
        - name: AUTH_KEYCLOAK_ISSUER
          value: https://sso.brmartin.co.uk/realms/prod
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: langfuse-secrets
              optional: false
        - name: DIRECT_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: langfuse-secrets
              optional: false
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              key: NEXTAUTH_SECRET
              name: langfuse-secrets
              optional: false
        - name: SALT
          valueFrom:
            secretKeyRef:
              key: SALT
              name: langfuse-secrets
              optional: false
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: ENCRYPTION_KEY
              name: langfuse-secrets
              optional: false
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: CLICKHOUSE_PASSWORD
              name: langfuse-secrets
              optional: false
        - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: S3_ACCESS_KEY_ID
              name: langfuse-secrets
              optional: false
        - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: S3_SECRET_ACCESS_KEY
              name: langfuse-secrets
              optional: false
        - name: AUTH_KEYCLOAK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: AUTH_CUSTOM_CLIENT_ID
              name: langfuse-secrets
              optional: false
        - name: AUTH_KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: AUTH_CUSTOM_CLIENT_SECRET
              name: langfuse-secrets
              optional: false
        image: langfuse/langfuse-worker:3
        imagePullPolicy: IfNotPresent
        name: langfuse-worker
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
