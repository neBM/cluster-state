apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: langfuse
    component: web
  name: langfuse-web
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: langfuse
      component: web
      managed-by: terraform
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: langfuse
        component: web
        managed-by: terraform
    spec:
      automountServiceAccountToken: true
      containers:
      - command:
        - /bin/sh
        - -ec
        args:
        - |
          bucket_info=/cosi/langfuse/BucketInfo

          parse() {
            sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$bucket_info"
          }

          bucket=$(parse bucketName)
          endpoint=$(parse endpoint)
          region=$(parse region)
          access_key=$(parse accessKeyID)
          secret_key=$(parse accessSecretKey)

          if [ "$bucket" != "langfuse" ] || [ -z "$endpoint" ] || [ -z "$region" ] || [ -z "$access_key" ] || [ -z "$secret_key" ]; then
            echo "ERROR: COSI BucketInfo is missing required Langfuse S3 fields"
            exit 1
          fi

          export LANGFUSE_S3_EVENT_UPLOAD_BUCKET="$bucket"
          export LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT="$endpoint"
          export LANGFUSE_S3_EVENT_UPLOAD_REGION="$region"
          export LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID="$access_key"
          export LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY="$secret_key"

          exec dumb-init -- ./web/entrypoint.sh /bin/sh -c 'if [ -n "$NEXT_PUBLIC_LANGFUSE_CLOUD_REGION" ]; then node --import dd-trace/initialize.mjs ./web/server.js --keepAliveTimeout 110000; else node ./web/server.js --keepAliveTimeout 110000; fi'
        env:
        - name: NEXTAUTH_URL
          value: https://langfuse.brmartin.co.uk
        - name: TELEMETRY_ENABLED
          value: 'false'
        - name: NODE_OPTIONS
          value: --max-old-space-size=1536
        - name: CLICKHOUSE_MIGRATION_URL
          value: clickhouse://clickhouse.default.svc.cluster.local:9000
        - name: CLICKHOUSE_URL
          value: http://clickhouse.default.svc.cluster.local:8123
        - name: CLICKHOUSE_USER
          value: default
        - name: REDIS_CONNECTION_STRING
          value: redis://valkey.default.svc.cluster.local:6379/0
        - name: LANGFUSE_S3_EVENT_UPLOAD_ENABLED
          value: 'true'
        - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
          value: 'true'
        - name: AUTH_KEYCLOAK_ISSUER
          value: https://sso.brmartin.co.uk/realms/prod
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: langfuse-secrets
              optional: false
        - name: DIRECT_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: langfuse-secrets
              optional: false
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              key: NEXTAUTH_SECRET
              name: langfuse-secrets
              optional: false
        - name: SALT
          valueFrom:
            secretKeyRef:
              key: SALT
              name: langfuse-secrets
              optional: false
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: ENCRYPTION_KEY
              name: langfuse-secrets
              optional: false
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: CLICKHOUSE_PASSWORD
              name: langfuse-secrets
              optional: false
        - name: AUTH_KEYCLOAK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: AUTH_CUSTOM_CLIENT_ID
              name: langfuse-secrets
              optional: false
        - name: AUTH_KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: AUTH_CUSTOM_CLIENT_SECRET
              name: langfuse-secrets
              optional: false
        image: langfuse/langfuse
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/public/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        name: langfuse-web
        ports:
        - containerPort: 3000
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/public/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 768Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /cosi/langfuse
          name: langfuse-cosi
          readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
      - name: langfuse-cosi
        secret:
          secretName: langfuse-s3
