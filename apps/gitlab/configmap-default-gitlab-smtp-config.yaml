apiVersion: v1
data:
  smtp_settings.rb: "# Managed in cluster-state \u2014 do not edit manually\n# Loaded\
    \ by Rails from config/initializers/smtp_settings.rb\nif Rails.env.production?\n\
    \  ActionMailer::Base.delivery_method = :smtp\n  ActionMailer::Base.smtp_settings\
    \ = {\n    address:              \"mail.brmartin.co.uk\",\n    port:         \
    \        587,\n    user_name:            ENV.fetch(\"GITLAB_SMTP_USERNAME\"),\n\
    \    password:             ENV.fetch(\"GITLAB_SMTP_PASSWORD\"),\n    domain: \
    \              \"brmartin.co.uk\",\n    authentication:       :login,\n    enable_starttls_auto:\
    \ true,\n  }\nend\n"
immutable: false
kind: ConfigMap
metadata:
  labels:
    app: gitlab
  name: gitlab-smtp-config
  namespace: default
