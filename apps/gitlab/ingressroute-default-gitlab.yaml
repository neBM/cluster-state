apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  labels:
    app: gitlab
  name: gitlab
  namespace: default
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`git.brmartin.co.uk`) && PathPrefix(`/-/kubernetes-agent/k8s-proxy`)
    priority: 110
    services:
    - name: gitlab-kas
      port: 8154
  - kind: Rule
    match: Host(`git.brmartin.co.uk`) && PathPrefix(`/-/kubernetes-agent`)
    priority: 100
    services:
    - name: gitlab-kas
      port: 8150
  - kind: Rule
    match: Host(`git.brmartin.co.uk`)
    services:
    - name: gitlab-workhorse
      port: 8181
  tls:
    secretName: wildcard-brmartin-tls
