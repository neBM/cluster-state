apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- configmap-default-gitaly-config.yaml
- configmap-default-gitlab-config-templates.yaml
- configmap-default-gitlab-kas-config.yaml
- configmap-default-gitlab-registry-config.yaml
- configmap-default-gitlab-smtp-config.yaml
- configmap-default-workhorse-config.yaml
- deployment-default-gitlab-gitaly.yaml
- deployment-default-gitlab-kas.yaml
- deployment-default-gitlab-redis.yaml
- deployment-default-gitlab-registry.yaml
- deployment-default-gitlab-sidekiq.yaml
- deployment-default-gitlab-webservice.yaml
- deployment-default-gitlab-workhorse.yaml
- ingressroute-default-gitlab.yaml
- ingressroute-default-gitlab-registry.yaml
- persistentvolumeclaim-default-gitlab-registry-sw.yaml
- persistentvolumeclaim-default-gitlab-repositories-sw.yaml
- persistentvolumeclaim-default-gitlab-shared-sw.yaml
- persistentvolumeclaim-default-gitlab-uploads-sw.yaml
- service-default-gitlab-gitaly.yaml
- service-default-gitlab-kas.yaml
- service-default-gitlab-redis.yaml
- service-default-gitlab-registry.yaml
- service-default-gitlab-registry-internal.yaml
- service-default-gitlab-webservice.yaml
- service-default-gitlab-workhorse.yaml
- job-default-gitlab-migrations.yaml
namespace: default
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
- name: gitlab-release
  literals:
  - appVersion=v19.1.0
  # renovate: datasource=docker depName=registry.gitlab.com/gitlab-org/build/cng/gitlab-webservice-ce
  - migrationVersion=v19.1.0
  - migrationRunSuffix=r1
replacements:
- source:
    kind: ConfigMap
    name: gitlab-release
    fieldPath: data.migrationVersion
  targets:
  - select:
      kind: Job
      labelSelector: app=gitlab,component=migrations
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 2
- source:
    kind: ConfigMap
    name: gitlab-release
    fieldPath: data.migrationRunSuffix
  targets:
  - select:
      kind: Job
      labelSelector: app=gitlab,component=migrations
    fieldPaths:
    - metadata.name
    options:
      delimiter: '-'
      index: 3
- source:
    kind: ConfigMap
    name: gitlab-release
    fieldPath: data.migrationVersion
  targets:
  - select:
      kind: Job
      labelSelector: app=gitlab,component=migrations
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
- source:
    kind: ConfigMap
    name: gitlab-release
    fieldPath: data.appVersion
  targets:
  - select:
      kind: Deployment
      name: gitlab-gitaly
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
  - select:
      kind: Deployment
      name: gitlab-kas
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
  - select:
      kind: Deployment
      name: gitlab-registry
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
  - select:
      kind: Deployment
      name: gitlab-sidekiq
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
  - select:
      kind: Deployment
      name: gitlab-webservice
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1
  - select:
      kind: Deployment
      name: gitlab-workhorse
    fieldPaths:
    - spec.template.spec.containers.0.image
    options:
      delimiter: ':'
      index: 1

images:
- name: "redis"
  newTag: "8-alpine"

# Rails components keep only component-specific storage in their base manifests.
# Shared GitLab Rails config and secret mounts are injected here to prevent drift
# between webservice, sidekiq, and migrations.
patches:
- path: patch-gitlab-rails-runtime-deployments.yaml
  target:
    kind: Deployment
    labelSelector: gitlab.com/rails-runtime=true
- path: patch-gitlab-rails-runtime-job.yaml
  target:
    kind: Job
    labelSelector: gitlab.com/rails-runtime=true
- path: patch-gitlab-rails-registry-auth-deployment.yaml
  target:
    kind: Deployment
    labelSelector: gitlab.com/rails-registry-auth=true
- path: patch-gitlab-rails-registry-auth-job.yaml
  target:
    kind: Job
    labelSelector: gitlab.com/rails-registry-auth=true
