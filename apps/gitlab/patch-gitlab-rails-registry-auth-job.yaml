- op: add
  path: /spec/template/spec/containers/0/volumeMounts/8
  value:
    mountPath: /etc/gitlab/registry
    name: registry-auth
    readOnly: true
- op: add
  path: /spec/template/spec/volumes/8
  value:
    name: registry-auth
    secret:
      defaultMode: 420
      optional: false
      secretName: gitlab-registry-auth
