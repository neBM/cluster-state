apiVersion: v1
kind: Service
metadata:
  labels:
    app: open-webui
    component: app
  name: open-webui
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ports:
  - port: 80
    protocol: TCP
    targetPort: 8080
  selector:
    app: open-webui
    component: app
  sessionAffinity: None
  type: ClusterIP
