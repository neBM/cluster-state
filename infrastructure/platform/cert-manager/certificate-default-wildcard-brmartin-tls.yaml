apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app: cert-manager
    environment: prod
  name: wildcard-brmartin-tls
  namespace: default
spec:
  commonName: brmartin.co.uk
  dnsNames:
  - brmartin.co.uk
  - '*.brmartin.co.uk'
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-cloudflare
  privateKey:
    algorithm: RSA
    size: 2048
  secretName: wildcard-brmartin-tls
  secretTemplate:
    annotations:
      reloader.stakater.com/match: 'true'
