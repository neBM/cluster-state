apiVersion: resource.k8s.io/v1
kind: DeviceClass
metadata:
  annotations:
    meta.helm.sh/release-name: nvidia-dra-driver-gpu
    meta.helm.sh/release-namespace: nvidia-dra-driver
  labels:
    app.kubernetes.io/managed-by: Helm
  name: compute-domain-default-channel.nvidia.com
spec:
  selectors:
  - cel:
      expression: device.driver == 'compute-domain.nvidia.com' && device.attributes['compute-domain.nvidia.com'].type
        == 'channel' && device.attributes['compute-domain.nvidia.com'].id == 0
