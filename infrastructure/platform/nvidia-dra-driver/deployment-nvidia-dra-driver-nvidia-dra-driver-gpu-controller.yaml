apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    meta.helm.sh/release-name: nvidia-dra-driver-gpu
    meta.helm.sh/release-namespace: nvidia-dra-driver
  labels:
    app.kubernetes.io/instance: nvidia-dra-driver-gpu
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: nvidia-dra-driver-gpu
    app.kubernetes.io/version: 25.12.0
    helm.sh/chart: nvidia-dra-driver-gpu-25.12.0
  name: nvidia-dra-driver-gpu-controller
  namespace: nvidia-dra-driver
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      nvidia-dra-driver-gpu-component: controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nvidia-dra-driver-gpu
        app.kubernetes.io/name: nvidia-dra-driver-gpu
        nvidia-dra-driver-gpu-component: controller
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
      containers:
      - command:
        - compute-domain-controller
        - -v
        - $(LOG_VERBOSITY)
        env:
        - name: LOG_VERBOSITY
          value: '4'
        - name: LOG_VERBOSITY_CD_DAEMON
          value: '4'
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: IMAGE_NAME
          value: nvcr.io/nvidia/k8s-dra-driver-gpu:v25.12.0
        - name: NVIDIA_VISIBLE_DEVICES
          value: void
        image: nvcr.io/nvidia/k8s-dra-driver-gpu:v25.12.0
        imagePullPolicy: IfNotPresent
        name: compute-domain
        resources: {}
        securityContext: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      priorityClassName: system-node-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: nvidia-dra-driver-gpu-service-account-controller
      serviceAccountName: nvidia-dra-driver-gpu-service-account-controller
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
