apiVersion: 1
groups:
    - orgId: 1
      name: etcd-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: etcd-request-errors-api
          title: etcd Request Errors
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: sum by(instance, kubernetes_io_hostname) (increase(etcd_request_errors_total{job="kubernetes-nodes"}[5m]))
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 10m
          annotations:
            description: etcd has reported {{ $values.A }} request error(s) in the last 5 minutes on {{ if $labels.kubernetes_io_hostname }}{{ $labels.kubernetes_io_hostname }}{{ else if $labels.node }}{{ $labels.node }}{{ else }}{{ $labels.instance }}{{ end }}. Any non-zero etcd request error is still a bug and should be investigated, but this warning should only fire after the 5-minute signal stays non-zero for 10 minutes so brief maintenance-correlated bursts remain pending instead of emailing.
            summary: etcd request errors on {{ if $labels.kubernetes_io_hostname }}{{ $labels.kubernetes_io_hostname }}{{ else if $labels.node }}{{ $labels.node }}{{ else }}{{ $labels.instance }}{{ end }}
          labels:
            severity: warning
          isPaused: false
        - uid: storage-consistency-check-failure-api
          title: Storage Consistency Check Failure
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: sum by(instance, kubernetes_io_hostname) (increase(apiserver_storage_consistency_checks_total{job="kubernetes-nodes",status!="success"}[15m])) or sum by(instance, kubernetes_io_hostname) (0 * up{job="kubernetes-nodes"})
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          annotations:
            description: The apiserver on {{ if $labels.kubernetes_io_hostname }}{{ $labels.kubernetes_io_hostname }}{{ else if $labels.node }}{{ $labels.node }}{{ else }}{{ $labels.instance }}{{ end }} has reported {{ $values.A }} non-success storage consistency check(s) in the last 15 minutes. This indicates an apiserver/etcd consistency problem and should be treated as critical.
            summary: Storage consistency checks failed on {{ if $labels.kubernetes_io_hostname }}{{ $labels.kubernetes_io_hostname }}{{ else if $labels.node }}{{ $labels.node }}{{ else }}{{ $labels.instance }}{{ end }}
          labels:
            severity: critical
          isPaused: false
    - orgId: 1
      name: node-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: node-down-api
          title: Node Down
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: (label_replace(max_over_time(up{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"}[2m]), "internal_ip", "$1", "instance", "(.*):.*") * on(internal_ip) group_left(node) kube_node_info) < 1
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 1
                        type: lt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          annotations:
            description: node-exporter on {{ $labels.node }} ({{ $labels.instance }}) has had no successful scrapes for 2 minutes.
            summary: Node {{ $labels.node }} is down
          labels:
            severity: critical
          isPaused: false
        - uid: high-memory-usage-api
          title: High Memory Usage
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: label_replace((1 - (node_memory_MemAvailable_bytes{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"} / node_memory_MemTotal_bytes{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"})) * 100, "internal_ip", "$1", "instance", "(.*):.*") * on(internal_ip) group_left(node) kube_node_info
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 90
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: Memory usage on {{ $labels.node }} ({{ $labels.instance }}) has exceeded 90% for more than 5 minutes.
            summary: High memory usage on {{ $labels.node }}
          labels:
            severity: warning
          isPaused: false
        - uid: high-cpu-usage-api
          title: High CPU Usage
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: label_replace(100 - (avg by(instance) (rate(node_cpu_seconds_total{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter",mode="idle"}[5m])) * 100), "internal_ip", "$1", "instance", "(.*):.*") * on(internal_ip) group_left(node) kube_node_info
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 85
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 10m
          annotations:
            description: CPU usage on {{ $labels.node }} ({{ $labels.instance }}) has exceeded 85% for more than 10 minutes.
            summary: High CPU usage on {{ $labels.node }}
          labels:
            severity: warning
          isPaused: false
        - uid: disk-space-low-api
          title: Disk Space Low
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: label_replace((node_filesystem_avail_bytes{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter",mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter",mountpoint="/",fstype!="tmpfs"}) * 100, "internal_ip", "$1", "instance", "(.*):.*") * on(internal_ip) group_left(node) kube_node_info
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 15
                        type: lt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: Root filesystem on {{ $labels.node }} ({{ $labels.instance }}) has less than 15% free space.
            summary: Low disk space on {{ $labels.node }}
          labels:
            severity: critical
          isPaused: false
    - orgId: 1
      name: pod-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: pod-crashloopbackoff-api
          title: Pod CrashLoopBackOff
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: Container {{ $values.A.Labels.container }} in pod {{ $values.A.Labels.namespace }}/{{ $values.A.Labels.pod }} has been in CrashLoopBackOff for more than 5 minutes.
            summary: Pod {{ $values.A.Labels.namespace }}/{{ $values.A.Labels.pod }} container {{ $values.A.Labels.container }} is in CrashLoopBackOff
          labels:
            severity: warning
          isPaused: false
        - uid: pod-restarting-frequently-api
          title: Pod Restarting Frequently
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: increase(kube_pod_container_status_restarts_total[15m])
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 3
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 15m
          annotations:
            description: Container {{ $values.A.Labels.container }} in pod {{ $values.A.Labels.namespace }}/{{ $values.A.Labels.pod }} has restarted more than 3 times in 15 minutes.
            summary: Pod {{ $values.A.Labels.namespace }}/{{ $values.A.Labels.pod }} container {{ $values.A.Labels.container }} is restarting frequently
          labels:
            severity: warning
          isPaused: false
    - orgId: 1
      name: prometheus-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: prometheus-target-down-api
          title: Prometheus Target Down
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: |-
                    label_replace(
                      (1 - up{job="kubernetes-nodes"}) > 0,
                      "node",
                      "$1",
                      "instance",
                      "(.*)"
                    )
                    or
                    (
                      label_replace(
                        (1 - up{job="kubernetes-apiservers"}) > 0,
                        "internal_ip",
                        "$1",
                        "instance",
                        "(.*):.*"
                      )
                      * on(internal_ip) group_left(node) kube_node_info
                    )
                    or
                    (
                      label_replace(
                        (1 - up{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"}) > 0,
                        "internal_ip",
                        "$1",
                        "instance",
                        "(.*):.*"
                      )
                      * on(internal_ip) group_left(node) kube_node_info
                    )
                    or
                    (
                      (1 - up) > 0
                      unless on(job, instance) (
                        label_replace(
                          (1 - up{job="kubernetes-nodes"}) > 0,
                          "node",
                          "$1",
                          "instance",
                          "(.*)"
                        )
                        or
                        (
                          label_replace(
                            (1 - up{job="kubernetes-apiservers"}) > 0,
                            "internal_ip",
                            "$1",
                            "instance",
                            "(.*):.*"
                          )
                          * on(internal_ip) group_left(node) kube_node_info
                        )
                        or
                        (
                          label_replace(
                            (1 - up{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"}) > 0,
                            "internal_ip",
                            "$1",
                            "instance",
                            "(.*):.*"
                          )
                          * on(internal_ip) group_left(node) kube_node_info
                        )
                      )
                    )
                    or
                    (
                      label_replace(
                        label_replace(
                          label_replace(
                            sum by(job) (0 * up{job="kubernetes-nodes"}),
                            "job",
                            "all-targets",
                            "job",
                            ".*"
                          ),
                          "instance",
                          "all-targets",
                          "job",
                          ".*"
                        ),
                        "fallback",
                        "true",
                        "job",
                        ".*"
                      )
                      unless on() (
                        label_replace(
                          (1 - up{job="kubernetes-nodes"}) > 0,
                          "node",
                          "$1",
                          "instance",
                          "(.*)"
                        )
                        or
                        (
                          label_replace(
                            (1 - up{job="kubernetes-apiservers"}) > 0,
                            "internal_ip",
                            "$1",
                            "instance",
                            "(.*):.*"
                          )
                          * on(internal_ip) group_left(node) kube_node_info
                        )
                        or
                        (
                          label_replace(
                            (1 - up{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"}) > 0,
                            "internal_ip",
                            "$1",
                            "instance",
                            "(.*):.*"
                          )
                          * on(internal_ip) group_left(node) kube_node_info
                        )
                        or
                        (
                          (1 - up) > 0
                          unless on(job, instance) (
                            label_replace(
                              (1 - up{job="kubernetes-nodes"}) > 0,
                              "node",
                              "$1",
                              "instance",
                              "(.*)"
                            )
                            or
                            (
                              label_replace(
                                (1 - up{job="kubernetes-apiservers"}) > 0,
                                "internal_ip",
                                "$1",
                                "instance",
                                "(.*):.*"
                              )
                              * on(internal_ip) group_left(node) kube_node_info
                            )
                            or
                            (
                              label_replace(
                                (1 - up{job="kubernetes-service-endpoints",app_kubernetes_io_name="node-exporter"}) > 0,
                                "internal_ip",
                                "$1",
                                "instance",
                                "(.*):.*"
                              )
                              * on(internal_ip) group_left(node) kube_node_info
                            )
                          )
                        )
                      )
                    )
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: '{{ if $values.A.Labels.fallback }}No Prometheus scrape targets have been unreachable for more than 5 minutes.{{ else }}Scrape target {{ $values.A.Labels.job }}/{{ if $values.A.Labels.node }}{{ $values.A.Labels.node }}{{ else if $values.A.Labels.kubernetes_io_hostname }}{{ $values.A.Labels.kubernetes_io_hostname }}{{ else }}{{ $values.A.Labels.instance }}{{ end }} has been unreachable for more than 5 minutes.{{ end }}'
            summary: '{{ if $values.A.Labels.fallback }}All Prometheus scrape targets are healthy{{ else }}Prometheus scrape target {{ $values.A.Labels.job }}/{{ if $values.A.Labels.node }}{{ $values.A.Labels.node }}{{ else if $values.A.Labels.kubernetes_io_hostname }}{{ $values.A.Labels.kubernetes_io_hostname }}{{ else }}{{ $values.A.Labels.instance }}{{ end }} is down{{ end }}'
          labels:
            severity: warning
          isPaused: false
    - orgId: 1
      name: seaweedfs-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: seaweedfs-readonly-volumes-api
          title: SeaweedFS Read-Only Volumes
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: sum by(instance, kubernetes_name, kubernetes_namespace) (SeaweedFS_volumeServer_read_only_volumes{job="kubernetes-service-endpoints",kubernetes_name="seaweedfs-volume",kubernetes_namespace="default"})
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: 'SeaweedFS volume metrics on {{ $labels.instance }} are reporting {{ $values.A }} read-only volume(s) for {{ $labels.kubernetes_namespace }}/{{ $labels.kubernetes_name }}. Treat any non-zero value as a storage incident: capture `vol/status`, scrub the affected volumes, and repair tail-only corruption before marking volumes writable again.'
            summary: 'SeaweedFS volume server on {{ $labels.instance }} has read-only volumes'
          labels:
            severity: critical
          isPaused: false
        - uid: seaweedfs-volume-refresh-failed-api
          title: SeaweedFS Volume Refresh Failed
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: sum by(instance, kubernetes_name, kubernetes_namespace) (increase(seaweedfs_recycler_volume_refreshes_total{job="kubernetes-service-endpoints",kubernetes_name="seaweedfs-consumer-recycler-metrics",kubernetes_namespace="default",result="failed"}[15m]))
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          annotations:
            description: SeaweedFS recycler metrics on {{ $labels.instance }} have reported {{ $values.A }} failed in-place volume routing refresh(es) in the last 15 minutes for {{ $labels.kubernetes_namespace }}/{{ $labels.kubernetes_name }}. This indicates a blocked storage rollout or stale-routing repair failure and should be treated as critical.
            summary: SeaweedFS volume refresh failed on {{ $labels.instance }}
          labels:
            severity: critical
          isPaused: false
        - uid: seaweedfs-filer-delete-retries-api
          title: SeaweedFS Filer Delete Retries Exhausted
          condition: C
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: loki
              model:
                datasource:
                    type: loki
                    uid: loki
                editorMode: code
                expr: sum by(pod, container) (count_over_time({namespace="default",pod=~"seaweedfs-filer-.*",container="filer"} |= "max retry attempts (10) reached" |= "read only" [15m]))
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: '{{ $labels.pod }} is still logging {{ $values.A }} SeaweedFS filer delete retry exhaustion event(s) in the last 15 minutes. This usually means a backing volume is read-only and mail hard-delete is still failing.'
            summary: 'SeaweedFS filer delete retries exhausted on {{ $labels.pod }}'
          labels:
            severity: critical
          isPaused: false
        - uid: seaweedfs-maildir-metadata-mismatch-api
          title: SeaweedFS Maildir Metadata Mismatch Burst
          condition: C
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: loki
              model:
                datasource:
                    type: loki
                    uid: loki
                editorMode: code
                expr: sum by(pod, container) (count_over_time({namespace="default",pod=~"seaweedfs-(mount|filer)-.*"} |= "metadata revision mismatch" |= "Maildir" |= "dovecot-uidlist" [15m]))
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 5
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 5m
          annotations:
            description: '{{ $labels.pod }} has logged {{ $values.A }} Maildir `dovecot-uidlist` metadata revision mismatch event(s) in the last 15 minutes. This is an early warning for remote Maildir metadata contention and mailbox delete latency.'
            summary: 'SeaweedFS Maildir metadata mismatch burst on {{ $labels.pod }}'
          labels:
            severity: warning
          isPaused: false
    - orgId: 1
      name: backup-health
      folder: Infrastructure Alerts
      interval: 1m
      rules:
        - uid: restic-backup-stale-api
          title: Restic Backup Stale
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: prometheus
              model:
                datasource:
                    type: prometheus
                    uid: prometheus
                expr: time() - kube_cronjob_status_last_successful_time{namespace="default",cronjob="restic-backup"}
                instant: true
                intervalMs: 1000
                maxDataPoints: 43200
                refId: A
            - refId: C
              datasourceUid: "-100"
              model:
                conditions:
                    - evaluator:
                        params:
                            - 129600
                        type: gt
                datasource:
                    type: __expr__
                    uid: "-100"
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: OK
          for: 10m
          annotations:
            description: default/restic-backup has not recorded a successful run for more than 36 hours. Failed Jobs can remain after a later successful recovery, so do not page on retained failures alone. Confirm the CronJob is not suspended, inspect the latest Job status, and check `kubectl logs job/<latest-restic-job> -n default`.
            summary: Restic backup has been stale for more than 36 hours
          labels:
            severity: critical
          isPaused: false
