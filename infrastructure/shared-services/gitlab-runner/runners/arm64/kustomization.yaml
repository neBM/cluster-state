apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
generatorOptions:
  disableNameSuffixHash: true
nameSuffix: -arm64
configMapGenerator:
- name: gitlab-runner-config-template
  behavior: merge
  files:
  - fragments/05-concurrent.toml
  - fragments/35-env-extra.toml
  - fragments/55-kubernetes-resources.toml
  - fragments/60-pull-policy.toml
  - fragments/65-helper-image.toml
  - fragments/75-kubernetes-services.toml
  - fragments/80-node-selector.toml
- name: gitlab-runner-system-id
  options:
    labels:
      app: gitlab-runner
      arch: arm64
  envs:
  - system-id.env
resources:
- ../../runner-base
patches:
- path: patch-deployment.yaml
