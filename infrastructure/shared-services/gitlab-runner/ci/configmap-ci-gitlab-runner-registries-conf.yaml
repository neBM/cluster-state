apiVersion: v1
data:
  registries.conf: "# In-cluster registry bypass: CoreDNS rewrites registry.brmartin.co.uk to the\n# internal registry service (port 443 -> 5000). The insecure flag makes buildah\n# use plain HTTP on :443 instead of TLS, connecting directly to the registry\n# pod without Traefik or TLS overhead.\n[[registry]]\nlocation = \"registry.brmartin.co.uk\"\ninsecure = true\n"
immutable: false
kind: ConfigMap
metadata:
  labels:
    app: gitlab-runner
  name: gitlab-runner-registries-conf
  namespace: ci
