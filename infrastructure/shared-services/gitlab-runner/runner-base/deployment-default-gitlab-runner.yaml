apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gitlab-runner
  name: gitlab-runner
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gitlab-runner
      managed-by: terraform
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gitlab-runner
        managed-by: terraform
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - run
        - --config
        - /config/config.toml
        image: gitlab/gitlab-runner
        imagePullPolicy: Always
        name: gitlab-runner
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          mountPropagation: None
          name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      initContainers:
      - args:
        - |
          set -eu
          for file in /template/[0-9][0-9]-*.toml; do
            cat "$file"
          done > /config/config.toml.template

          bucket_info=/cosi/gitlab-runner-cache/BucketInfo
          parse_cosi_field() {
            sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$bucket_info"
          }

          cache_bucket=$(parse_cosi_field bucketName)
          cache_endpoint=$(parse_cosi_field endpoint)
          cache_access_key=$(parse_cosi_field accessKeyID)
          cache_secret_key=$(parse_cosi_field accessSecretKey)

          if [ "$cache_bucket" != "gitlab-runner-cache" ] || [ -z "$cache_endpoint" ] || [ -z "$cache_access_key" ] || [ -z "$cache_secret_key" ]; then
            echo "ERROR: COSI BucketInfo is missing required GitLab runner cache S3 fields"
            exit 1
          fi

          cache_endpoint=${cache_endpoint#http://}
          cache_endpoint=${cache_endpoint#https://}

          sed \
            -e "s|RUNNER_NAME_PLACEHOLDER|$RUNNER_NAME|g" \
            -e "s|RUNNER_TOKEN_PLACEHOLDER|$RUNNER_TOKEN|g" \
            -e "s|S3_SERVER_ADDRESS_PLACEHOLDER|$cache_endpoint|g" \
            -e "s|S3_BUCKET_NAME_PLACEHOLDER|$cache_bucket|g" \
            -e "s|MINIO_ACCESS_KEY_PLACEHOLDER|$cache_access_key|g" \
            -e "s|MINIO_SECRET_KEY_PLACEHOLDER|$cache_secret_key|g" \
            /config/config.toml.template > /config/config.toml
          cp /system-id/system_id /config/.runner_system_id
        command:
        - /bin/sh
        - -c
        env:
        - name: RUNNER_NAME
          value: CHANGEME
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              key: runner_token_placeholder
              name: gitlab-runner-secrets
              optional: false
        image: busybox
        imagePullPolicy: IfNotPresent
        name: config-generator
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /template
          mountPropagation: None
          name: config-template
        - mountPath: /config
          mountPropagation: None
          name: config
        - mountPath: /system-id
          mountPropagation: None
          name: system-id
        - mountPath: /cosi/gitlab-runner-cache
          name: gitlab-runner-cache-cosi
          readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: gitlab-runner
      serviceAccountName: gitlab-runner
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: gitlab-runner-config-template
          optional: false
        name: config-template
      - configMap:
          defaultMode: 420
          name: gitlab-runner-system-id
          optional: false
        name: system-id
      - name: gitlab-runner-cache-cosi
        secret:
          secretName: gitlab-runner-cache-cosi-s3
      - emptyDir: {}
        name: config
