apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gitlab-runner
  name: gitlab-runner
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gitlab-runner
      managed-by: terraform
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gitlab-runner
        managed-by: terraform
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - run
        - --config
        - /config/config.toml
        image: gitlab/gitlab-runner:v18.11.1
        imagePullPolicy: Always
        name: gitlab-runner
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          mountPropagation: None
          name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
      - args:
        - |
          set -eu
          for file in /template/[0-9][0-9]-*.toml; do
            cat "$file"
          done > /config/config.toml.template
          sed -e "s/RUNNER_NAME_PLACEHOLDER/$RUNNER_NAME/" -e "s/RUNNER_TOKEN_PLACEHOLDER/$RUNNER_TOKEN/" -e "s/MINIO_ACCESS_KEY_PLACEHOLDER/$MINIO_ACCESS_KEY/" -e "s/MINIO_SECRET_KEY_PLACEHOLDER/$MINIO_SECRET_KEY/" /config/config.toml.template > /config/config.toml
          cp /system-id/system_id /config/.runner_system_id
        command:
        - /bin/sh
        - -c
        env:
        - name: RUNNER_NAME
          value: CHANGEME
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              key: runner_token_placeholder
              name: gitlab-runner-secrets
              optional: false
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: accesskey
              name: gitlab-runner-cache-s3
              optional: false
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: secretkey
              name: gitlab-runner-cache-s3
              optional: false
        image: busybox:1.37
        imagePullPolicy: IfNotPresent
        name: config-generator
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /template
          mountPropagation: None
          name: config-template
        - mountPath: /config
          mountPropagation: None
          name: config
        - mountPath: /system-id
          mountPropagation: None
          name: system-id
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: gitlab-runner
      serviceAccountName: gitlab-runner
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: gitlab-runner-config-template
          optional: false
        name: config-template
      - configMap:
          defaultMode: 420
          name: gitlab-runner-system-id
          optional: false
        name: system-id
      - emptyDir: {}
        name: config
