  [runners.kubernetes]
    namespace = "ci"
    service_account = "gitlab-runner"
    image = "alpine:latest"
    privileged = true
    enable_service_links = false

    # Shared resource defaults for build containers.
    # Runner-specific CPU requests and limits live in each runner variant.
    memory_request = "512Mi"
    memory_limit = "6Gi"

    # Helper container resources.
    helper_cpu_request = "50m"
    helper_memory_request = "128Mi"
    helper_memory_limit = "256Mi"

    # Poll settings.
    poll_interval = 1
    poll_timeout = 180

    # Cleanup.
    cleanup_grace_period_seconds = 5
