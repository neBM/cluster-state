apiVersion: v1
kind: Service
metadata:
  labels:
    app: seaweedfs
    component: s3
    environment: prod
  name: seaweedfs-s3
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 8333
    protocol: TCP
    targetPort: 8333
  selector:
    app: seaweedfs
    component: s3
  sessionAffinity: None
  type: ClusterIP
