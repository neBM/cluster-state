apiVersion: v1
kind: Service
metadata:
  labels:
    app: seaweedfs
    component: filer
    environment: prod
  name: seaweedfs-filer
  namespace: default
spec:
  clusterIP: None
  clusterIPs:
  - None
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 8888
    protocol: TCP
    targetPort: 8888
  - name: grpc
    port: 18888
    protocol: TCP
    targetPort: 18888
  selector:
    app: seaweedfs
    component: filer
  sessionAffinity: None
  type: ClusterIP
