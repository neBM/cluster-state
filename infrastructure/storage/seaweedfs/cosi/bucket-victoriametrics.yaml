apiVersion: objectstorage.k8s.io/v1alpha1
kind: Bucket
metadata:
  labels:
    app: victoriametrics
    environment: prod
  name: victoriametrics
spec:
  bucketClaim:
    name: victoriametrics
    namespace: default
  bucketClassName: seaweedfs
  deletionPolicy: Retain
  driverName: seaweedfs.objectstorage.k8s.io
  existingBucketID: victoriametrics
  protocols:
    - s3
