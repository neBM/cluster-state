apiVersion: objectstorage.k8s.io/v1alpha1
kind: BucketAccess
metadata:
  labels:
    app: gitlab-runner
    environment: prod
  name: gitlab-runner-cache
  namespace: default
spec:
  bucketAccessClassName: seaweedfs-readwrite
  bucketClaimName: gitlab-runner-cache
  credentialsSecretName: gitlab-runner-cache-cosi-s3
  protocol: s3
