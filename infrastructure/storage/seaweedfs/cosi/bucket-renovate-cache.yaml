apiVersion: objectstorage.k8s.io/v1alpha1
kind: Bucket
metadata:
  labels:
    app: renovate
    environment: prod
  name: renovate-cache
spec:
  bucketClaim:
    name: renovate-cache
    namespace: default
  bucketClassName: seaweedfs
  deletionPolicy: Retain
  driverName: seaweedfs.objectstorage.k8s.io
  existingBucketID: renovate-cache
  protocols:
    - s3
