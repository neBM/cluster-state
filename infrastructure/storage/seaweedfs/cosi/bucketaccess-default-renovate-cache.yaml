apiVersion: objectstorage.k8s.io/v1alpha1
kind: BucketAccess
metadata:
  labels:
    app: renovate
    environment: prod
  name: renovate-cache
  namespace: default
spec:
  bucketAccessClassName: seaweedfs-readwrite
  bucketClaimName: renovate-cache
  credentialsSecretName: renovate-cache-s3
  protocol: s3
