apiVersion: objectstorage.k8s.io/v1alpha1
kind: BucketAccess
metadata:
  labels:
    app: seerr
    environment: prod
    migration-role: active-backup
  name: seerr-litestream
  namespace: default
spec:
  bucketAccessClassName: seaweedfs-readwrite
  bucketClaimName: seerr-litestream
  credentialsSecretName: seerr-litestream-s3
  protocol: s3
