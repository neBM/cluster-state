apiVersion: objectstorage.k8s.io/v1alpha1
kind: Bucket
metadata:
  labels:
    app: langfuse
    environment: prod
  name: langfuse
spec:
  bucketClaim:
    name: langfuse
    namespace: default
  bucketClassName: seaweedfs
  deletionPolicy: Retain
  driverName: seaweedfs.objectstorage.k8s.io
  existingBucketID: langfuse
  protocols:
    - s3
