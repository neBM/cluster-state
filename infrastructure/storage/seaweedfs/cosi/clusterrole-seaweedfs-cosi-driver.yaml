apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app: seaweedfs-cosi-driver
    app.kubernetes.io/name: seaweedfs-cosi-driver
    app.kubernetes.io/part-of: seaweedfs
    environment: prod
  name: seaweedfs-cosi-driver
rules:
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - buckets
  - bucketclaims
  - bucketaccesses
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - buckets/status
  - bucketclaims/status
  - bucketaccesses/status
  verbs:
  - update
  - patch
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - bucketclasses
  - bucketaccessclasses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ''
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ''
  resources:
  - events
  verbs:
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ''
  resources:
  - configmaps
  - serviceaccounts
  verbs:
  - get
  - list
