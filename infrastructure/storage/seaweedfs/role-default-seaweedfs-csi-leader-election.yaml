apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: seaweedfs
    environment: prod
  name: seaweedfs-csi-leader-election
  namespace: default
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - list
  - watch
  - create
  - update
  - patch
  - get
  - delete
