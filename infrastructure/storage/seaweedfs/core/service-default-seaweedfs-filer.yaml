apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '9324'
    prometheus.io/scrape: 'true'
  labels:
    app: seaweedfs
    component: filer
    environment: prod
  name: seaweedfs-filer
  namespace: default
spec:
  clusterIP: None
  clusterIPs:
  - None
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 8888
    protocol: TCP
    targetPort: 8888
  - name: grpc
    port: 18888
    protocol: TCP
    targetPort: 18888
  - name: metrics
    port: 9324
    protocol: TCP
    targetPort: metrics
  selector:
    app: seaweedfs
    component: filer
  sessionAffinity: None
  type: ClusterIP
