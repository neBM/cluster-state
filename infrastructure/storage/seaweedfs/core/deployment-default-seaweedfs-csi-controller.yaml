apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: seaweedfs
    component: csi-controller
    environment: prod
  name: seaweedfs-csi-controller
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: seaweedfs
      component: csi-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: seaweedfs
        component: csi-controller
        environment: prod
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - --endpoint=$(CSI_ENDPOINT)
        - --filer=$(SEAWEEDFS_FILER)
        - --driverName=seaweedfs-csi-driver
        - --components=controller
        - --attacher=true
        - --metricsPort=0
        env:
        - name: CSI_ENDPOINT
          value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
        - name: SEAWEEDFS_FILER
          value: seaweedfs-filer:8888
        image: registry.brmartin.co.uk/ben/seaweedfs-csi-driver
        imagePullPolicy: IfNotPresent
        name: csi-seaweedfs
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/pluginproxy
          mountPropagation: None
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --leader-election
        - --leader-election-namespace=default
        - --http-endpoint=:9809
        - --extra-create-metadata
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/pluginproxy/csi.sock
        image: registry.k8s.io/sig-storage/csi-provisioner
        imagePullPolicy: IfNotPresent
        name: csi-provisioner
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 20m
            memory: 32Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/pluginproxy
          mountPropagation: None
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --leader-election
        - --leader-election-namespace=default
        - --http-endpoint=:9811
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/pluginproxy/csi.sock
        image: registry.k8s.io/sig-storage/csi-attacher
        imagePullPolicy: IfNotPresent
        name: csi-attacher
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 20m
            memory: 32Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/pluginproxy
          mountPropagation: None
          name: socket-dir
      - args:
        - --csi-address=$(ADDRESS)
        - --leader-election
        - --leader-election-namespace=default
        - --http-endpoint=:9810
        env:
        - name: ADDRESS
          value: /var/lib/csi/sockets/pluginproxy/csi.sock
        image: registry.k8s.io/sig-storage/csi-resizer
        imagePullPolicy: IfNotPresent
        name: csi-resizer
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 20m
            memory: 32Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/csi/sockets/pluginproxy
          mountPropagation: None
          name: socket-dir
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: seaweedfs-csi
      serviceAccountName: seaweedfs-csi
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - emptyDir: {}
        name: socket-dir
