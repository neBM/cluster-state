apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '9324'
    prometheus.io/scrape: 'true'
  labels:
    app: seaweedfs
    component: volume
    environment: prod
  name: seaweedfs-volume
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: grpc
    port: 18080
    protocol: TCP
    targetPort: 18080
  - name: metrics
    port: 9324
    protocol: TCP
    targetPort: metrics
  selector:
    app: seaweedfs
    component: volume
  sessionAffinity: None
  type: ClusterIP
