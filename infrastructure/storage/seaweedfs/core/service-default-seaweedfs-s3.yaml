apiVersion: v1
kind: Service
metadata:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '9325'
    prometheus.io/scrape: 'true'
  labels:
    app: seaweedfs
    component: s3
    environment: prod
  name: seaweedfs-s3
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 8333
    protocol: TCP
    targetPort: 8333
  - name: metrics
    port: 9325
    protocol: TCP
    targetPort: metrics
  selector:
    app: seaweedfs
    component: s3
  sessionAffinity: None
  type: ClusterIP
