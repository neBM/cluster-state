apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: seaweedfs
    component: filer
    environment: prod
  name: seaweedfs-filer
  namespace: default
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: seaweedfs
      component: filer
  serviceName: seaweedfs-filer
  template:
    metadata:
      labels:
        app: seaweedfs
        component: filer
        environment: prod
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - filer
        - -master=seaweedfs-master:9333
        - -port=8888
        - -port.grpc=18888
        - -defaultReplicaPlacement=000
        - -ip=$(POD_NAME).seaweedfs-filer.default.svc.cluster.local
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        image: chrislusf/seaweedfs
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 8888
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 1
        name: filer
        ports:
        - containerPort: 8888
          name: http
          protocol: TCP
        - containerPort: 18888
          name: grpc
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: 8888
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 150m
            memory: 1536Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/seaweedfs
          mountPropagation: None
          name: config-runtime
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
      - args:
        - |
          set -eu

          awk '
          function toml_escape(value) {
            gsub(/\\/, "\\\\", value)
            gsub(/"/, "\\\"", value)
            return value
          }
          function replace_all(value, old, new, idx) {
            while ((idx = index(value, old)) > 0) {
              value = substr(value, 1, idx - 1) new substr(value, idx + length(old))
            }
            return value
          }
          BEGIN {
            values["POSTGRES_HOST_PLACEHOLDER"] = toml_escape(ENVIRON["PGHOST"])
            values["POSTGRES_PORT_PLACEHOLDER"] = ENVIRON["PGPORT"]
            values["POSTGRES_DATABASE_PLACEHOLDER"] = toml_escape(ENVIRON["PGDATABASE"])
            values["POSTGRES_USER_PLACEHOLDER"] = toml_escape(ENVIRON["PGUSER"])
            values["POSTGRES_PASSWORD_PLACEHOLDER"] = toml_escape(ENVIRON["PGPASSWORD"])
          }
          {
            line = $0
            for (placeholder in values) {
              line = replace_all(line, placeholder, values[placeholder])
            }
            print line
          }
          ' /config-template/filer.toml.tmpl > /config/filer.toml
          chmod 0444 /config/filer.toml
        command:
        - /bin/sh
        - -c
        env:
        - name: PGHOST
          valueFrom:
            secretKeyRef:
              key: POSTGRES_HOST
              name: seaweedfs-filer-postgres
              optional: false
        - name: PGPORT
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PORT
              name: seaweedfs-filer-postgres
              optional: false
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DATABASE
              name: seaweedfs-filer-postgres
              optional: false
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: seaweedfs-filer-postgres
              optional: false
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: seaweedfs-filer-postgres
              optional: false
        image: chrislusf/seaweedfs
        imagePullPolicy: IfNotPresent
        name: init-filer-config
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /config
          mountPropagation: None
          name: config-runtime
        - mountPath: /config-template
          mountPropagation: None
          name: config-template
          readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
        name: config-runtime
      - configMap:
          defaultMode: 420
          items:
          - key: filer.toml.tmpl
            path: filer.toml.tmpl
          name: seaweedfs-filer-config
          optional: false
        name: config-template
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
