apiVersion: v1
data:
  backup.sh: "#!/bin/sh\nset -e\n\nexport RESTIC_REPOSITORY=/repo\nexport RESTIC_PASSWORD_FILE=/secrets/password\n\
    \n# Initialize repo if needed\nif ! restic snapshots >/dev/null 2>&1; then\n \
    \ echo \"Initializing restic repository...\"\n  restic init\nfi\n\necho \"Starting\
    \ backup of SeaweedFS volumes...\"\n\nrestic backup /data-seaweedfs \\\n  --tag\
    \ seaweedfs \\\n  --tag scheduled \\\n  --iexclude-file=/config/excludes.txt \\\
    \n  --exclude-caches \\\n  --exclude-if-present .nobackup \\\n  --skip-if-unchanged\n\
    \necho \"Backup complete. Running cleanup...\"\n\n# Keep 7 daily, 4 weekly, 6\
    \ monthly snapshots\nrestic forget \\\n  --keep-daily 7 \\\n  --keep-weekly 4\
    \ \\\n  --keep-monthly 6 \\\n  --prune\n\necho \"Checking repository integrity...\"\
    \nrestic check\n\necho \"Backup job finished successfully\"\n"
  excludes.txt: '# Temporary and log files

    *.tmp

    *.log

    *.sock


    # SQLite temp files

    *-wal

    *-shm


    # Cache directories

    cache

    .cache


    # Log directories

    logs

    log


    # Plex/Jellyfin regenerable data

    codecs

    crash reports

    diagnostics

    updates

    media

    metadata

    transcodes


    '
immutable: false
kind: ConfigMap
metadata:
  labels:
    app: restic-backup
  name: restic-backup-scripts
  namespace: default
