apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/name: container-object-storage-interface-controller
    app.kubernetes.io/part-of: container-object-storage-interface
    app.kubernetes.io/version: release-0.2
  name: container-object-storage-controller
rules:
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - bucketclaims
  - bucketaccesses
  - bucketclaims/status
  - bucketaccesses/status
  verbs:
  - get
  - list
  - watch
  - update
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - buckets
  verbs:
  - get
  - list
  - watch
  - update
  - create
  - delete
- apiGroups:
  - objectstorage.k8s.io
  resources:
  - bucketclasses
  - bucketaccessclasses
  verbs:
  - get
  - list
- apiGroups:
  - ''
  resources:
  - events
  verbs:
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ''
  resources:
  - configmaps
  - serviceaccounts
  verbs:
  - list
  - get
