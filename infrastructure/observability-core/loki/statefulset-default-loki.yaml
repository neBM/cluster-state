apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: logging
    app.kubernetes.io/instance: loki
    app.kubernetes.io/name: loki
  name: loki
  namespace: default
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/instance: loki
      app.kubernetes.io/name: loki
  serviceName: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/component: logging
        app.kubernetes.io/instance: loki
        app.kubernetes.io/name: loki
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - -config.file=/etc/loki-runtime/loki.yaml
        - -target=all
        env: []
        image: grafana/loki
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 10
        name: loki
        ports:
        - containerPort: 3100
          name: http
          protocol: TCP
        - containerPort: 9095
          name: grpc
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /ready
            port: http
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/loki-runtime
          mountPropagation: None
          name: loki-runtime
          readOnly: true
        - mountPath: /loki
          mountPropagation: None
          name: data
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      initContainers:
      - args:
        - |
          bucket_info=/cosi/loki/BucketInfo
          template=/etc/loki-template/loki.yaml
          config=/etc/loki-runtime/loki.yaml

          parse() {
            sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\"\([^\"]*\)\".*/\1/p" "$bucket_info"
          }

          bucket=$(parse bucketName)
          endpoint=$(parse endpoint)
          region=$(parse region)
          access_key=$(parse accessKeyID)
          secret_key=$(parse accessSecretKey)

          if [ "$bucket" != "loki" ] || [ -z "$endpoint" ] || [ -z "$region" ] || [ -z "$access_key" ] || [ -z "$secret_key" ]; then
            echo "ERROR: COSI BucketInfo is missing required Loki S3 fields"
            exit 1
          fi

          endpoint=${endpoint#http://}
          endpoint=${endpoint#https://}

          sed \
            -e "s|__LOKI_ACCESS_KEY_ID__|$access_key|g" \
            -e "s|__LOKI_BUCKET__|$bucket|g" \
            -e "s|__LOKI_ENDPOINT__|$endpoint|g" \
            -e "s|__LOKI_REGION__|$region|g" \
            -e "s|__LOKI_SECRET_ACCESS_KEY__|$secret_key|g" \
            "$template" > "$config"
        command:
        - /bin/sh
        - -ec
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: render-loki-config
        volumeMounts:
        - mountPath: /cosi/loki
          name: loki-cosi
          readOnly: true
        - mountPath: /etc/loki-template
          name: config
          readOnly: true
        - mountPath: /etc/loki-runtime
          name: loki-runtime
      nodeSelector:
        kubernetes.io/hostname: hestia
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 300
      volumes:
      - configMap:
          defaultMode: 420
          name: loki-config
          optional: false
        name: config
      - emptyDir: {}
        name: loki-runtime
      - name: loki-cosi
        secret:
          secretName: loki-cosi-s3
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      labels:
        app.kubernetes.io/component: logging
        app.kubernetes.io/instance: loki
        app.kubernetes.io/name: loki
        app.kubernetes.io/managed-by: terraform
      name: data
      namespace: default
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: local-path-retain
      volumeMode: Filesystem
    status:
      phase: Pending
