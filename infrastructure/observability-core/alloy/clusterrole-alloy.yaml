apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/component: logging
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/name: alloy
  name: alloy
rules:
- apiGroups:
  - ''
  resources:
  - nodes
  - pods
  - services
  - endpoints
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ''
  resources:
  - nodes/proxy
  verbs:
  - get
