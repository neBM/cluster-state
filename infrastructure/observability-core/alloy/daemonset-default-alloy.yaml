apiVersion: apps/v1
kind: DaemonSet
metadata:
  annotations:
    deprecated.daemonset.template.generation: '4'
  labels:
    app.kubernetes.io/component: logging
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/name: alloy
  name: alloy
  namespace: default
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: alloy
      app.kubernetes.io/name: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/component: logging
        app.kubernetes.io/instance: alloy
        app.kubernetes.io/name: alloy
    spec:
      automountServiceAccountToken: true
      containers:
      - args:
        - run
        - /etc/alloy/config.alloy
        - --storage.path=/var/lib/alloy/data
        - --server.http.listen-addr=0.0.0.0:12345
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        image: grafana/alloy:v1.7.1
        imagePullPolicy: IfNotPresent
        name: alloy
        ports:
        - containerPort: 12345
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 384Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: true
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          runAsUser: 0
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/alloy
          mountPropagation: None
          name: config
          readOnly: true
        - mountPath: /var/log/pods
          mountPropagation: None
          name: pod-logs
          readOnly: true
        - mountPath: /var/log
          mountPropagation: None
          name: var-log
          readOnly: true
        - mountPath: /var/log/journal
          mountPropagation: None
          name: journal
          readOnly: true
        - mountPath: /run/log/journal
          mountPropagation: None
          name: run-journal
          readOnly: true
        - mountPath: /var/lib/alloy
          mountPropagation: None
          name: positions
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: alloy
      serviceAccountName: alloy
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - configMap:
          defaultMode: 420
          name: alloy-config
          optional: false
        name: config
      - hostPath:
          path: /var/log/pods
          type: Directory
        name: pod-logs
      - hostPath:
          path: /var/log
          type: Directory
        name: var-log
      - hostPath:
          path: /var/log/journal
          type: DirectoryOrCreate
        name: journal
      - hostPath:
          path: /run/log/journal
          type: DirectoryOrCreate
        name: run-journal
      - hostPath:
          path: /var/lib/alloy
          type: DirectoryOrCreate
        name: positions
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
